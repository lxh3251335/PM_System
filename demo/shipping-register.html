<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发货登记 - 冷库项目信息管理系统</title>
    <link rel="stylesheet" href="assets/css/app.css">
    <script src="assets/js/config.js?v=20260223"></script>
    <script src="assets/js/api.js?v=20260223"></script>
    <style>
        .card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 24px; }
        .card h3 { margin: 0 0 20px 0; font-size: 18px; color: var(--text-primary); }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }
        .form-full { grid-column: 1 / -1; }
        .btn { padding: 10px 24px; border-radius: 4px; font-size: 14px; cursor: pointer; border: none; transition: all 0.3s; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: #096dd9; }
        .btn-secondary { background: white; color: var(--text-primary); border: 1px solid #d9d9d9; }
        .btn-secondary:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .btn-danger { background: #ff4d4f; color: white; }
        .btn-danger:hover { background: #cf1322; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; }
        table th, table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        table th { background: #fafafa; font-weight: 600; color: var(--text-secondary); }
        table tr:hover { background: #f5f5f5; }
        .status-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
        .status-shipped { background: #e6f7ff; color: #1890ff; }
        .status-arrived { background: #f6ffed; color: #52c41a; }
        .status-pending { background: #fffbe6; color: #faad14; }
        .empty-state { text-align: center; padding: 60px 0; color: var(--text-secondary); }
        .filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
        .info-box { background: #e6f7ff; border-left: 4px solid var(--primary-color); padding: 16px; border-radius: 4px; margin-bottom: 24px; }
        .info-box p { margin: 0; color: var(--text-secondary); font-size: 14px; }

        .steps { display: flex; justify-content: space-between; margin-bottom: 40px; padding: 0 20px; }
        .step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        .step::after { content: ''; position: absolute; top: 20px; left: 50%; width: 100%; height: 2px; background: #e8e8e8; z-index: -1; }
        .step:last-child::after { display: none; }
        .step-number { width: 40px; height: 40px; border-radius: 50%; background: #e8e8e8; color: #999; display: flex; align-items: center; justify-content: center; font-weight: 600; margin-bottom: 8px; position: relative; z-index: 1; }
        .step.active .step-number { background: var(--primary-color); color: white; }
        .step.completed .step-number { background: #52c41a; color: white; }
        .step.completed::after { background: #52c41a; }
        .step-title { font-size: 14px; color: var(--text-secondary); text-align: center; }
        .step.active .step-title { color: var(--primary-color); font-weight: 500; }
        .step.completed .step-title { color: #52c41a; }
        .step.clickable { cursor: pointer; }
        .step.clickable:hover .step-number { transform: scale(1.1); }

        .flow-action-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 24px; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <header class="top-bar">
                <h1>发货登记</h1>
                <div class="user-menu"></div>
            </header>
            <div class="content-wrapper">

        <div class="steps" id="stepNavContainer" style="display:none;"></div>

        <div class="info-box" id="roleHint">
            <p>请选择项目后查看或管理发货记录。</p>
        </div>

        <div class="card">
            <div class="filter-bar">
                <label style="font-weight: 500;">选择项目：</label>
                <select id="projectSelect" onchange="onProjectChange()" style="min-width: 300px;">
                    <option value="">-- 请选择项目 --</option>
                </select>
                <button class="btn btn-primary btn-sm" id="addShipmentBtn" onclick="showAddForm()" style="display:none;">+ 新增发货记录</button>
            </div>
        </div>

        <!-- 新增发货表单（默认隐藏） -->
        <div class="card" id="addFormCard" style="display: none;">
            <h3>新增发货记录</h3>
            <form id="shippingForm" onsubmit="submitForm(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>关联网关</label>
                        <select id="gatewaySelect" name="gateway_id">
                            <option value="">不关联网关（仅邮寄）</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>快递公司 *</label>
                        <select name="courier_company" required>
                            <option value="">请选择</option>
                            <option value="顺丰速运">顺丰速运</option>
                            <option value="中通快递">中通快递</option>
                            <option value="圆通速递">圆通速递</option>
                            <option value="韵达快递">韵达快递</option>
                            <option value="申通快递">申通快递</option>
                            <option value="极兔速递">极兔速递</option>
                            <option value="京东物流">京东物流</option>
                            <option value="邮政EMS">邮政EMS</option>
                            <option value="德邦物流">德邦物流</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>快递单号 *</label>
                        <input type="text" name="tracking_no" required placeholder="请输入快递单号">
                    </div>
                    <div class="form-group">
                        <label>邮寄日期 *</label>
                        <input type="date" name="mailing_date" required>
                    </div>
                    <div class="form-group">
                        <label>预计到达日期</label>
                        <input type="date" name="expected_arrival_date">
                    </div>
                    <div class="form-group">
                        <label>收件人 *</label>
                        <input type="text" name="recipient_name" required placeholder="收件人姓名">
                    </div>
                    <div class="form-group">
                        <label>收件人电话 *</label>
                        <input type="text" name="recipient_phone" required placeholder="手机号码">
                    </div>
                    <div class="form-group">
                        <label>收件地址 *</label>
                        <input type="text" name="recipient_address" required placeholder="详细收件地址">
                    </div>
                    <div class="form-group form-full">
                        <label>邮寄物品描述</label>
                        <textarea name="item_description" rows="2" placeholder="如：网关1台、电源适配器1个"></textarea>
                    </div>
                    <div class="form-group form-full">
                        <label>备注</label>
                        <textarea name="remarks" rows="2" placeholder="可选备注"></textarea>
                    </div>
                </div>
                <div style="margin-top: 20px; display: flex; gap: 12px;">
                    <button type="submit" class="btn btn-primary">提交发货记录</button>
                    <button type="button" class="btn btn-secondary" onclick="hideAddForm()">取消</button>
                </div>
            </form>
        </div>

        <!-- 发货记录列表 -->
        <div class="card">
            <h3>发货记录 <span id="recordCount" style="font-weight: normal; color: var(--text-secondary);"></span></h3>
            <div id="recordList">
                <div class="empty-state">请先选择项目</div>
            </div>
        </div>

        <!-- 流程操作栏（仅从流程进入时显示） -->
        <div class="flow-action-bar" id="flowActionBar" style="display:none;">
            <button class="btn btn-secondary" onclick="window.location.href='communication-setup.html'">← 返回上一步</button>
            <button class="btn btn-primary" onclick="goToComplete()">完成发货登记，提交 →</button>
        </div>
            </div><!-- content-wrapper -->
        </main>
    </div><!-- app-container -->

    <script src="assets/js/nav.js"></script>
    <script src="assets/js/step-nav.js"></script>
    <script>
        requireAuth();

        var isFlowMode = (document.referrer.indexOf('communication-setup') !== -1) ||
                         localStorage.getItem('currentProjectId');

        let currentProjectId = null;
        let projects = [];
        let records = [];

        function initStepNav() {
            if (isAdmin() && isFlowMode) {
                document.getElementById('stepNavContainer').style.display = '';
                renderStepNav(8);
                document.getElementById('flowActionBar').style.display = '';
            }
        }

        function goToComplete() {
            window.location.href = 'project-complete.html?mode=complete';
        }

        async function initPage() {
            initStepNav();
            if (isAdmin()) {
                document.getElementById('addShipmentBtn').style.display = '';
                document.getElementById('roleHint').querySelector('p').textContent =
                    '管理员可以新增发货记录、编辑和删除。客户仅能查看。';
            } else {
                document.getElementById('roleHint').querySelector('p').textContent =
                    '您可以在此查看您项目的发货及物流状态。';
            }

            try {
                projects = await api.projects.getProjects();
                const select = document.getElementById('projectSelect');
                (projects || []).forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = `${p.project_no} - ${p.name} (${p.end_customer || '-'})`;
                    select.appendChild(opt);
                });

                // 如果有上下文项目，自动选中
                const savedProjId = localStorage.getItem('currentProjectId');
                if (savedProjId) {
                    select.value = savedProjId;
                    onProjectChange();
                }
            } catch (e) {
                console.warn('加载项目列表失败:', e.message);
            }
        }

        async function onProjectChange() {
            const projectId = document.getElementById('projectSelect').value;
            if (!projectId) {
                document.getElementById('recordList').innerHTML = '<div class="empty-state">请先选择项目</div>';
                document.getElementById('recordCount').textContent = '';
                return;
            }
            currentProjectId = projectId;
            await loadRecords();
            await loadGateways();
            await prefillRecipient();
        }

        async function loadRecords() {
            try {
                records = await api.mailing.getRecords(currentProjectId);
                renderRecords();
            } catch (e) {
                console.warn('加载发货记录失败:', e.message);
                records = [];
                renderRecords();
            }
        }

        async function loadGateways() {
            try {
                const gateways = await api.gateways.getGateways({ project_id: currentProjectId });
                const select = document.getElementById('gatewaySelect');
                select.innerHTML = '<option value="">不关联网关（仅邮寄）</option>';
                (gateways || []).forEach(gw => {
                    const opt = document.createElement('option');
                    opt.value = gw.id;
                    opt.textContent = `${gw.gateway_no} (${gw.brand || '-'} ${gw.model || ''})`;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.warn('加载网关列表失败:', e.message);
            }
        }

        async function prefillRecipient() {
            const proj = projects.find(p => String(p.id) === String(currentProjectId));
            if (proj) {
                const form = document.getElementById('shippingForm');
                if (proj.recipient_name) form.recipient_name.value = proj.recipient_name;
                if (proj.recipient_phone) form.recipient_phone.value = proj.recipient_phone;
                if (proj.mailing_address) form.recipient_address.value = proj.mailing_address;
            }
        }

        function renderRecords() {
            const container = document.getElementById('recordList');
            document.getElementById('recordCount').textContent = `(${records.length}条)`;

            if (!records || records.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无发货记录</div>';
                return;
            }

            const adminActions = isAdmin();
            let html = '<table><thead><tr>';
            html += '<th>快递公司</th><th>快递单号</th><th>邮寄日期</th><th>预计到达</th><th>实际到达</th>';
            html += '<th>收件人</th><th>物品</th><th>状态</th>';
            if (adminActions) html += '<th>操作</th>';
            html += '</tr></thead><tbody>';

            records.forEach(r => {
                let status = '已发货';
                let statusClass = 'status-shipped';
                if (r.actual_arrival_date) {
                    status = '已签收';
                    statusClass = 'status-arrived';
                } else if (!r.mailing_date) {
                    status = '待发货';
                    statusClass = 'status-pending';
                }

                html += '<tr>';
                html += `<td>${r.courier_company || '-'}</td>`;
                html += `<td><code>${r.tracking_no || '-'}</code></td>`;
                html += `<td>${r.mailing_date || '-'}</td>`;
                html += `<td>${r.expected_arrival_date || '-'}</td>`;
                html += `<td>${r.actual_arrival_date || '-'}</td>`;
                html += `<td>${r.recipient_name || '-'} ${r.recipient_phone ? '(' + r.recipient_phone + ')' : ''}</td>`;
                html += `<td>${r.item_description || '-'}</td>`;
                html += `<td><span class="status-badge ${statusClass}">${status}</span></td>`;
                if (adminActions) {
                    html += `<td>`;
                    if (!r.actual_arrival_date) {
                        html += `<button class="btn btn-sm btn-primary" onclick="markArrived(${r.id})" style="margin-right:4px;">确认到达</button>`;
                    }
                    html += `<button class="btn btn-sm btn-danger" onclick="deleteRecord(${r.id})">删除</button>`;
                    html += `</td>`;
                }
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function showAddForm() {
            if (!currentProjectId) {
                alert('请先选择项目');
                return;
            }
            document.getElementById('addFormCard').style.display = '';
            document.getElementById('shippingForm').mailing_date.value = new Date().toISOString().split('T')[0];
        }

        function hideAddForm() {
            document.getElementById('addFormCard').style.display = 'none';
        }

        async function submitForm(e) {
            e.preventDefault();
            const form = document.getElementById('shippingForm');
            const data = {
                gateway_id: form.gateway_id.value ? parseInt(form.gateway_id.value) : null,
                courier_company: form.courier_company.value,
                tracking_no: form.tracking_no.value,
                mailing_date: form.mailing_date.value || null,
                expected_arrival_date: form.expected_arrival_date.value || null,
                recipient_name: form.recipient_name.value,
                recipient_phone: form.recipient_phone.value,
                recipient_address: form.recipient_address.value,
                item_description: form.item_description.value || null,
                remarks: form.remarks.value || null,
            };

            try {
                await api.mailing.createRecord(currentProjectId, data);
                api.projects.showSuccess('发货记录创建成功');
                hideAddForm();
                form.reset();
                await loadRecords();
            } catch (e) {
                console.error('创建发货记录失败:', e.message);
            }
        }

        async function markArrived(recordId) {
            if (!confirm('确认该批次已到达？')) return;
            try {
                await api.mailing.updateRecord(recordId, {
                    actual_arrival_date: new Date().toISOString().split('T')[0]
                });
                api.projects.showSuccess('已标记到达');
                await loadRecords();
            } catch (e) {
                console.error('更新失败:', e.message);
            }
        }

        async function deleteRecord(recordId) {
            if (!confirm('确定删除该发货记录？')) return;
            try {
                await api.mailing.deleteRecord(recordId);
                api.projects.showSuccess('删除成功');
                await loadRecords();
            } catch (e) {
                console.error('删除失败:', e.message);
            }
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
