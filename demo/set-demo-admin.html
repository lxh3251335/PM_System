<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置Demo管理员</title>
    <script src="assets/js/config.js?v=20260223"></script>
</head>
<body>
    <h1>正在设置Demo管理员...</h1>
    <script>
        // 设置管理员用户信息到LocalStorage
        localStorage.setItem('userRole', 'admin');
        localStorage.setItem('currentUsername', 'admin001');
        localStorage.setItem('currentUserId', '2');
        localStorage.setItem('companyName', '系统管理');
        localStorage.setItem(getStorageKey('token'), 'demo-token-admin001');

        console.log('LocalStorage已设置:');
        console.log('userRole:', localStorage.getItem('userRole'));
        console.log('currentUsername:', localStorage.getItem('currentUsername'));
        console.log('currentUserId', localStorage.getItem('currentUserId'));

        // 立即跳转到项目列表页面
        window.location.href = 'project-list.html';
    </script>
</body>
</html>
