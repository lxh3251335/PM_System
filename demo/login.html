<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 冷库项目信息管理系统</title>
    <script src="assets/js/config.js?v=20260223"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --login-bg-0: #0b1220;
            --login-bg-1: #111b2e;
            --login-accent: #2563eb;
            --login-accent-hover: #1d4ed8;
            --login-accent-soft: rgba(37, 99, 235, 0.12);
            --login-text: #0f172a;
            --login-muted: #64748b;
            --login-border: #e2e8f0;
            --login-card: #ffffff;
            --login-radius: 20px;
            --login-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.06), 0 24px 48px -12px rgba(15, 23, 42, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(20px, 4vw, 40px);
            color: var(--login-text);
            background-color: var(--login-bg-0);
            background-image:
                radial-gradient(ellipse 120% 80% at 50% -20%, rgba(37, 99, 235, 0.25), transparent 55%),
                radial-gradient(ellipse 90% 60% at 100% 50%, rgba(14, 165, 233, 0.12), transparent 45%),
                radial-gradient(ellipse 70% 50% at 0% 80%, rgba(99, 102, 241, 0.1), transparent 40%),
                linear-gradient(165deg, var(--login-bg-0) 0%, var(--login-bg-1) 100%);
        }

        .login-shell {
            width: 100%;
            max-width: 440px;
        }

        .login-container {
            background: var(--login-card);
            border-radius: var(--login-radius);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--login-shadow);
            padding: clamp(36px, 5vw, 48px) clamp(28px, 4vw, 40px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-mark {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            border-radius: 14px;
            background: linear-gradient(145deg, #1e40af 0%, #2563eb 45%, #0ea5e9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
        }

        .logo-mark svg {
            width: 28px;
            height: 28px;
            color: #fff;
        }

        .login-brand {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: clamp(1.75rem, 4vw, 2rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--login-text);
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--login-muted);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--login-text);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.01em;
        }

        .user-type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .user-type-btn {
            padding: 14px 12px;
            border: 1px solid var(--login-border);
            border-radius: 12px;
            background: #fafbfc;
            cursor: pointer;
            transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            color: var(--login-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .user-type-btn:hover {
            border-color: #cbd5e1;
            background: #fff;
        }

        .user-type-btn.active {
            border-color: var(--login-accent);
            background: var(--login-accent-soft);
            color: var(--login-accent);
            box-shadow: 0 0 0 1px var(--login-accent);
        }

        .user-type-btn svg {
            width: 22px;
            height: 22px;
            opacity: 0.85;
        }

        .user-type-btn.active svg {
            color: var(--login-accent);
            opacity: 1;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid var(--login-border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: #fafbfc;
        }

        input:hover {
            border-color: #cbd5e1;
        }

        input:focus {
            outline: none;
            border-color: var(--login-accent);
            background: #fff;
            box-shadow: 0 0 0 3px var(--login-accent-soft);
        }

        .btn-login {
            width: 100%;
            padding: 14px 20px;
            margin-top: 8px;
            background: var(--login-accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-login:hover:not(:disabled) {
            background: var(--login-accent-hover);
            box-shadow: 0 10px 28px -6px rgba(37, 99, 235, 0.45);
        }

        .btn-login:focus-visible {
            outline: 2px solid var(--login-accent);
            outline-offset: 2px;
        }

        .btn-login:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .login-footer {
            margin-top: 32px;
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid var(--login-border);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--login-accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--login-accent-hover);
        }

        .back-link svg {
            width: 18px;
            height: 18px;
        }

        .copyright {
            margin-top: 16px;
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.5;
        }

        @media (prefers-reduced-motion: reduce) {
            .user-type-btn,
            input,
            .btn-login,
            .back-link {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-container">
            <div class="login-header">
                <div class="logo-mark" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 10v10a1 1 0 001 1h6V9H5a1 1 0 00-1 1z"/>
                        <path d="M14 20h5a1 1 0 001-1V10a1 1 0 00-1-1h-6v11z"/>
                        <path d="M4 10V8a2 2 0 012-2h2.5M14 6h2.5a2 2 0 012 2v2"/>
                        <path d="M12 4v4"/>
                    </svg>
                </div>
                <h1 class="login-brand">欢迎登录</h1>
                <p class="subtitle">冷库项目信息管理系统</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>选择用户类型</label>
                    <div class="user-type-selector" role="group" aria-label="用户类型">
                        <button type="button" class="user-type-btn active" data-type="customer" aria-pressed="true">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                            <span>客户</span>
                        </button>
                        <button type="button" class="user-type-btn" data-type="admin" aria-pressed="false">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
                            <span>管理员</span>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-login">登录</button>
            </form>

            <div class="login-footer">
                <a href="index.html" class="back-link">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
                    返回首页
                </a>
                <p class="copyright">&copy; 2026 天津天商酷凌科技有限公司 · V1.0.0</p>
            </div>
        </div>
    </div>

    <script>
        const userTypeBtns = document.querySelectorAll('.user-type-btn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        function applyRoleDefaults(type) {
            if (type === 'admin') {
                usernameInput.value = 'admin001';
                passwordInput.value = 'admin@2024!';
            } else {
                usernameInput.value = 'customer001';
                passwordInput.value = 'customer@2024!';
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            var active = document.querySelector('.user-type-btn.active');
            applyRoleDefaults(active && active.dataset.type === 'admin' ? 'admin' : 'customer');
        });

        userTypeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                userTypeBtns.forEach(b => {
                    b.classList.remove('active');
                    b.setAttribute('aria-pressed', 'false');
                });
                btn.classList.add('active');
                btn.setAttribute('aria-pressed', 'true');
                if (btn.dataset.type === 'customer') {
                    usernameInput.value = 'customer001';
                    passwordInput.value = 'customer@2024!';
                } else {
                    usernameInput.value = 'admin001';
                    passwordInput.value = 'admin@2024!';
                }
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const selectedType = document.querySelector('.user-type-btn.active')?.dataset.type || 'customer';
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            const submitBtn = document.querySelector('.btn-login');
            const prevText = submitBtn.textContent;
            submitBtn.textContent = '登录中…';
            submitBtn.disabled = true;

            if (typeof isDemoMode === 'function' && isDemoMode()) {
                const demoAccounts = {
                    'customer001': { role: 'customer', id: 1, company: '演示客户公司' },
                    'admin001': { role: 'admin', id: 2, company: '系统管理' }
                };
                const account = demoAccounts[username];
                if (!account || password !== 'password123') {
                    alert('用户名或密码错误');
                    submitBtn.textContent = prevText;
                    submitBtn.disabled = false;
                    return;
                }
                if (selectedType !== account.role) {
                    alert('账号角色为' + (account.role === 'admin' ? '管理员' : '客户') + '，请切换用户类型后重试');
                    submitBtn.textContent = prevText;
                    submitBtn.disabled = false;
                    return;
                }
                localStorage.setItem('userRole', account.role);
                localStorage.setItem('currentUserId', String(account.id));
                localStorage.setItem('currentUsername', username);
                localStorage.setItem('companyName', account.company);
                localStorage.setItem(getStorageKey('token'), 'demo-token-' + username);
                window.location.href = 'project-list.html';
                return;
            }

            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.detail || '登录失败');
                }

                const dbRoleRaw = (result.role || 'customer').toLowerCase();
                const dbRole = dbRoleRaw === 'factory' ? 'admin' : (dbRoleRaw === 'user' ? 'customer' : dbRoleRaw);
                if (selectedType !== dbRole) {
                    throw new Error(`账号角色为${dbRole === 'admin' ? '管理员' : '客户'}，请切换用户类型后重试`);
                }

                localStorage.setItem('userRole', dbRole);
                localStorage.setItem('currentUserId', String(result.id || ''));
                localStorage.setItem('currentUsername', result.username || username);
                localStorage.setItem('companyName', result.company_name || '');
                localStorage.setItem(getStorageKey('token'), result.access_token || '');
                window.location.href = 'project-list.html';
            } catch (error) {
                alert(error.message || '登录失败');
                submitBtn.textContent = prevText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
