<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备登记 - 冷库项目信息管理系统</title>
    <link rel="stylesheet" href="assets/css/app.css">
    <script src="assets/js/config.js?v=20260223"></script>
    <script src="assets/js/api.js?v=20260223"></script>
    <style>
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .project-info-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .project-info-card h3 {
            margin: 0 0 12px 0;
            font-size: 18px;
        }

        .project-info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            font-size: 14px;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .step {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .step::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: #e8e8e8;
            z-index: -1;
        }

        .step:last-child::after {
            display: none;
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e8e8e8;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .step.active .step-number {
            background: var(--primary-color);
            color: white;
        }

        .step.completed .step-number {
            background: #52c41a;
            color: white;
        }

        .step.completed::after {
            background: #52c41a;
        }

        .step-title {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
        }

        .step.active .step-title {
            color: var(--primary-color);
            font-weight: 500;
        }

        .step.completed .step-title {
            color: #52c41a;
        }

        .page-header {
            background: white;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .page-header h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            color: var(--text-primary);
        }

        .page-header p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .device-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
        }

        .device-tab {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.3s;
            margin-bottom: -2px;
        }

        .device-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            font-weight: 500;
        }

        .device-tab:hover {
            color: var(--primary-color);
        }

        .form-card {
            background: white;
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-group label .required {
            color: #f5222d;
            margin-left: 4px;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }

        .form-help {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #096dd9;
        }

        .btn-success {
            background: #52c41a;
            color: white;
        }

        .btn-success:hover {
            background: #389e0d;
        }

        .device-list {
            margin-top: 24px;
        }

        .device-item {
            background: #fafafa;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .device-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .device-item-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .device-item-actions button {
            padding: 6px 16px;
            border: 1px solid #d9d9d9;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .device-item-actions button:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .device-item-actions button.delete:hover {
            border-color: #ff4d4f;
            color: #ff4d4f;
        }

        .device-item-actions button.copy {
            background: #52c41a;
            color: white;
            border: none;
        }

        .device-item-actions button.copy:hover {
            background: #389e0d;
        }

        .device-item-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .device-item-detail {
            display: flex;
            flex-direction: column;
        }

        .device-item-detail-label {
            color: #999;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .device-item-detail-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stats-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stats-card-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .stats-card-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 24px;
        }

        .step.clickable { cursor: pointer; }
        .step.clickable:hover .step-number { transform: scale(1.1); box-shadow: 0 2px 8px rgba(82,196,26,0.4); }
        .step.clickable .step-number, .step.clickable .step-title { transition: all 0.2s; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 步骤指示器 -->
        <div class="steps"></div>
        <script src="assets/js/step-nav.js"></script>
        <script>renderStepNav(3);</script>

        <!-- 项目信息 -->
        <div class="project-info-card" id="projectInfoCard">
            <h3>📦 当前项目</h3>
            <div class="project-info-grid" id="projectInfo"></div>
        </div>

        <!-- 页面标题 -->
        <div class="page-header">
            <h1>设备登记</h1>
            <p>从标准设备库中选择设备型号，快速完成设备登记。支持设备复制功能，提升录入效率。</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-cards" id="statsCardsContainer">
            <!-- 动态生成 -->
        </div>

        <!-- 视图模式切换 + 冷库筛选 -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px;">
            <div style="display: flex; gap: 8px; align-items: center;">
                <span style="font-size: 14px; color: var(--text-secondary);">视图模式：</span>
                <button class="btn btn-primary" id="viewModeType" onclick="setViewMode('type')" style="padding: 6px 16px; font-size: 13px;">按设备类型</button>
                <button class="btn" id="viewModeRoom" onclick="setViewMode('room')" style="padding: 6px 16px; font-size: 13px; border:1px solid #d9d9d9;">按冷库分组</button>
                <button class="btn" id="viewModeRelation" onclick="setViewMode('relation')" style="padding: 6px 16px; font-size: 13px; border:1px solid #d9d9d9;">设备关系拓扑</button>
            </div>
            <div id="coldRoomFilterBar" style="display: flex; gap: 6px; flex-wrap: wrap;"></div>
        </div>

        <!-- 设备类型选项卡 -->
        <div class="device-tabs" id="deviceTabsContainer">
            <!-- 动态生成 -->
        </div>

        <!-- 设备登记表单 -->
        <div class="form-card" id="deviceFormCard">
            <form id="deviceForm">
                <!-- 动态内容将根据设备类型填充 -->
            </form>
        </div>

        <!-- 已登记设备列表（按类型视图） -->
        <div class="form-card" id="typeViewCard">
            <h3 style="margin: 0 0 20px 0; color: var(--text-primary);">已登记设备</h3>
            <div class="device-list" id="deviceList">
                <p style="text-align: center; color: var(--text-secondary); padding: 40px 0;">
                    暂无设备，请添加第一个设备
                </p>
            </div>
        </div>

        <!-- 已登记设备列表（按冷库分组视图） -->
        <div class="form-card" id="roomViewCard" style="display: none;">
            <h3 style="margin: 0 0 20px 0; color: var(--text-primary);">设备列表（按冷库分组）</h3>
            <div id="roomGroupedList"></div>
        </div>

        <!-- 设备关系拓扑视图 -->
        <div class="form-card" id="relationViewCard" style="display: none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0; color: var(--text-primary);">设备关系拓扑</h3>
                <div style="display:flex; gap:8px; align-items:center;">
                    <span style="font-size:12px; color:var(--text-secondary);">图例：</span>
                    <span style="display:inline-flex; align-items:center; gap:4px; font-size:12px;"><span style="width:12px;height:12px;border-radius:2px;background:#1890ff;display:inline-block;"></span>温控器</span>
                    <span style="display:inline-flex; align-items:center; gap:4px; font-size:12px;"><span style="width:12px;height:12px;border-radius:2px;background:#52c41a;display:inline-block;"></span>冷风机</span>
                    <span style="display:inline-flex; align-items:center; gap:4px; font-size:12px;"><span style="width:12px;height:12px;border-radius:2px;background:#722ed1;display:inline-block;"></span>制冷机组</span>
                    <span style="display:inline-flex; align-items:center; gap:4px; font-size:12px;"><span style="width:12px;height:12px;border-radius:2px;background:#fa8c16;display:inline-block;"></span>电表</span>
                    <span style="display:inline-flex; align-items:center; gap:4px; font-size:12px;"><span style="width:12px;height:12px;border-radius:2px;background:#13c2c2;display:inline-block;"></span>其他</span>
                </div>
            </div>
            <div id="relationTopoContent"></div>
            <div id="relationTopoEmpty" style="display:none; text-align:center; padding:40px; color:var(--text-secondary);">
                <div style="font-size:48px; margin-bottom:16px;">🔗</div>
                <p>暂无设备关系数据，请先在「设备关系配置」页面建立设备间的关联关系。</p>
                <a href="device-bindline.html" class="btn btn-primary" style="display:inline-block; margin-top:12px; text-decoration:none;">前往配置设备关系</a>
            </div>
        </div>

        <!-- 操作栏 -->
        <div class="action-bar">
            <button class="btn btn-secondary" onclick="window.location.href='cold-room-create.html'">← 返回上一步</button>
            <button class="btn btn-success" onclick="continueToGateway()">完成设备登记，继续配置设备关系 →</button>
        </div>
    </div>

    <script>
        requireAuth();
        let project = {};
        let projectId = null;
        let coldRooms = [];
        let devices = [];
        let currentCategory = null;
        let categories = [];
        let viewMode = 'type';
        let filterRoomId = null;
        const equipmentLibrary = { brands: [], models: {} };

        const DEVICE_TYPE_CN = {
            'air_cooler': '冷风机', 'thermostat': '温控器', 'unit': '制冷机组',
            'meter': '电表', 'freezer': '冷柜', 'defrost_controller': '融霜控制器',
            'temp-controller': '温控器', 'refrigeration_unit': '制冷机组', 'electric_meter': '电表',
            'cooling_tower': '冷却塔', 'cabinet': '电控柜'
        };

        const METER_AREAS = [
            { value: 'total', label: '全站总电表' },
            { value: 'cold_chain', label: '冷链电表' },
            { value: 'ac', label: '空调电表' },
            { value: 'fish_tank', label: '鱼缸电表' },
            { value: 'lighting', label: '照明电表' },
            { value: 'hot_kitchen', label: '热厨电表' }
        ];

        function isMeterCategory(cat) {
            return resolveCategoryType(cat) === 'meter';
        }

        function resolveDeviceType(codeOrType) {
            if (!codeOrType) return '';
            return CODE_TO_DEVICE_TYPE[codeOrType] || codeOrType;
        }

        function resolveCategoryType(cat) {
            if (!cat) return '';
            const code = cat.code || '';
            const dt = resolveDeviceType(code);
            if (dt !== code) return dt;
            const name = (cat.name || '').trim();
            if (/电控柜/.test(name)) return 'cabinet';
            if (/冷却塔/.test(name)) return 'cooling_tower';
            if (/温控器/.test(name)) return 'thermostat';
            if (/电表/.test(name)) return 'meter';
            if (/冷风机/.test(name)) return 'air_cooler';
            if (/机组|制冷/.test(name)) return 'unit';
            if (/冷柜/.test(name)) return 'freezer';
            return dt;
        }

        function isCabinetCategory(cat) {
            return resolveCategoryType(cat) === 'cabinet';
        }

        function isCoolingTowerCategory(cat) {
            return resolveCategoryType(cat) === 'cooling_tower';
        }

        function needsCabinetSelect(cat) {
            const dt = resolveCategoryType(cat);
            return dt === 'thermostat' || dt === 'meter';
        }

        function getCabinetDevices() {
            return devices.filter(d => {
                const dt = resolveDeviceType(d.device_type) || resolveDeviceType(d.type);
                if (dt === 'cabinet') return true;
                const cat = categories.find(c => c.id === d.categoryId);
                return cat ? resolveCategoryType(cat) === 'cabinet' : false;
            });
        }

        const CODE_TO_DEVICE_TYPE = {
            'temp-controller': 'thermostat',
            'air_cooler': 'air_cooler',
            'refrigeration_unit': 'unit',
            'electric_meter': 'meter',
            'freezer': 'freezer',
            'defrost_controller': 'defrost_controller',
            'thermostat': 'thermostat',
            'unit': 'unit',
            'meter': 'meter',
            'cooling_tower': 'cooling_tower',
            'cabinet': 'cabinet'
        };

        function getDeviceStorageKey() {
            return projectId ? `devices_${projectId}` : 'devices';
        }

        function saveDevicesToStorage() {
            localStorage.setItem(getDeviceStorageKey(), JSON.stringify(devices));
        }

        function loadDevicesFromStorage() {
            devices = JSON.parse(localStorage.getItem(getDeviceStorageKey()) || '[]');
        }

        async function initPage() {
            projectId = localStorage.getItem('currentProjectId');
            project = JSON.parse(localStorage.getItem('currentProject') || '{}');
            try {
                if (projectId) {
                    project = await api.projects.getProject(projectId);
                    coldRooms = await api.projects.getColdRooms(projectId);
                } else {
                    coldRooms = JSON.parse(localStorage.getItem('coldRooms') || '[]');
                }
                
                // Load categories dynamically
                categories = await api.equipment.getCategories();
                if (!categories || categories.length === 0) {
                    // Fallback if empty (though should not happen if initialized)
                    categories = [
                        { id: 1, name: '冷风机', code: 'air_cooler' },
                        { id: 2, name: '温控器', code: 'thermostat' }
                    ];
                }
                
                renderTabsAndStats();
                
                // Select first category by default
                if (categories.length > 0) {
                    switchDeviceTab(categories[0].id);
                }

            } catch (error) {
                console.error('加载数据失败，使用本地数据:', error);
                coldRooms = JSON.parse(localStorage.getItem('coldRooms') || '[]');
                if (!categories || categories.length === 0) {
                    categories = [
                        { id: 1, name: '冷风机', code: 'air_cooler' },
                        { id: 2, name: '温控器', code: 'thermostat' },
                        { id: 3, name: '制冷机组', code: 'unit' },
                        { id: 4, name: '电表', code: 'meter' },
                        { id: 5, name: '冷柜', code: 'freezer' },
                        { id: 6, name: '融霜控制器', code: 'defrost_controller' }
                    ];
                }
                renderTabsAndStats();
                if (categories.length > 0) {
                    switchDeviceTab(categories[0].id);
                }
            }

            localStorage.setItem('currentProject', JSON.stringify(project || {}));
            loadDevicesFromStorage();
            await mergeApiDevices();
            renderProjectInfo();
            updateStats();
            if (currentCategory) renderDeviceList();
        }

        async function mergeApiDevices() {
            if (!projectId) return;
            try {
                var apiDevices = await api.devices.getDevices({ project_id: projectId });
                if (!Array.isArray(apiDevices) || apiDevices.length === 0) return;

                var localIdSet = {};
                devices.forEach(function(d) { localIdSet[d.id] = true; });

                var catCodeMap = {};
                categories.forEach(function(c) { catCodeMap[c.code] = c.id; });

                var added = 0;
                apiDevices.forEach(function(d) {
                    if (localIdSet[d.id]) return;
                    var catCode = d.device_type || '';
                    var categoryId = catCodeMap[catCode] || null;
                    devices.push({
                        id: d.id,
                        categoryId: categoryId,
                        type: d.device_type,
                        device_type: d.device_type,
                        device_no: d.device_no,
                        cold_room_id: d.cold_room_id ? String(d.cold_room_id) : '',
                        cold_room_name: '',
                        brand: d.brand || '-',
                        model: d.model || '-',
                        specifications: {},
                        created_at: d.created_at || new Date().toISOString()
                    });
                    added++;
                });

                if (added > 0) {
                    saveDevicesToStorage();
                    console.log('[Merge] ' + added + ' API devices merged into local storage');
                }
            } catch (e) {
                console.warn('API设备合并失败:', e.message);
            }
        }

        function sortCategories() {
            const order = ['cabinet', 'thermostat', 'meter', 'air_cooler', 'unit', 'cooling_tower', 'freezer', 'defrost_controller'];
            categories.sort((a, b) => {
                const da = resolveCategoryType(a);
                const db = resolveCategoryType(b);
                const ia = order.indexOf(da);
                const ib = order.indexOf(db);
                const pa = ia >= 0 ? ia : 999;
                const pb = ib >= 0 ? ib : 999;
                return pa - pb;
            });
        }

        function renderTabsAndStats() {
            sortCategories();
            const tabsContainer = document.getElementById('deviceTabsContainer');
            tabsContainer.innerHTML = categories.map((cat, index) => {
                const label = DEVICE_TYPE_CN[cat.code] || cat.name;
                return '<button class="device-tab ' + (index === 0 ? 'active' : '') + '" id="tab_' + cat.id + '" onclick="switchDeviceTab(' + cat.id + ')">' + label + '</button>';
            }).join('');

            const statsContainer = document.getElementById('statsCardsContainer');
            statsContainer.innerHTML = categories.map(cat => {
                const label = DEVICE_TYPE_CN[cat.code] || cat.name;
                return '<div class="stats-card"><div class="stats-card-value" id="count_' + cat.id + '">0</div><div class="stats-card-label">' + label + '</div></div>';
            }).join('');

            renderColdRoomFilter();
        }

        function renderColdRoomFilter() {
            const bar = document.getElementById('coldRoomFilterBar');
            if (!bar) return;
            if (coldRooms.length === 0) { bar.innerHTML = ''; return; }

            let html = '<button onclick="setColdRoomFilter(null)" style="padding:5px 14px; border-radius:14px; border:1px solid var(--primary-color); background:var(--primary-color); color:white; cursor:pointer; font-size:13px;" id="roomFilterAll">全部</button>';
            coldRooms.forEach(r => {
                html += '<button onclick="setColdRoomFilter(' + r.id + ')" id="roomFilter_' + r.id + '" style="padding:5px 14px; border-radius:14px; border:1px solid #d9d9d9; background:white; color:#333; cursor:pointer; font-size:13px;">' + (r.name || '冷库' + r.id) + '</button>';
            });
            bar.innerHTML = html;
        }

        function setColdRoomFilter(roomId) {
            filterRoomId = roomId;
            document.querySelectorAll('#coldRoomFilterBar button').forEach(b => {
                b.style.background = 'white'; b.style.color = '#333'; b.style.borderColor = '#d9d9d9';
            });
            const activeBtn = roomId ? document.getElementById('roomFilter_' + roomId) : document.getElementById('roomFilterAll');
            if (activeBtn) { activeBtn.style.background = 'var(--primary-color)'; activeBtn.style.color = 'white'; activeBtn.style.borderColor = 'var(--primary-color)'; }

            if (viewMode === 'type') {
                renderDeviceList();
            } else {
                renderRoomGroupedView();
            }
        }

        function setViewMode(mode) {
            viewMode = mode;
            const modes = ['type', 'room', 'relation'];
            modes.forEach(m => {
                const btn = document.getElementById('viewMode' + m.charAt(0).toUpperCase() + m.slice(1));
                if (btn) {
                    if (m === mode) {
                        btn.className = 'btn btn-primary';
                        btn.style.border = 'none';
                    } else {
                        btn.className = 'btn';
                        btn.style.border = '1px solid #d9d9d9';
                    }
                }
            });

            document.getElementById('deviceTabsContainer').style.display = mode === 'type' ? '' : 'none';
            document.getElementById('deviceFormCard').style.display = mode === 'type' ? '' : 'none';
            document.getElementById('typeViewCard').style.display = mode === 'type' ? '' : 'none';
            document.getElementById('roomViewCard').style.display = mode === 'room' ? '' : 'none';
            document.getElementById('relationViewCard').style.display = mode === 'relation' ? '' : 'none';

            if (mode === 'room') renderRoomGroupedView();
            else if (mode === 'relation') renderRelationTopoView();
            else renderDeviceList();
        }

        function renderRoomGroupedView() {
            const container = document.getElementById('roomGroupedList');
            const filtered = filterRoomId ? devices.filter(d => String(d.cold_room_id) === String(filterRoomId)) : devices;

            if (filtered.length === 0 && coldRooms.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-secondary); padding:40px;">暂无数据</p>';
                return;
            }

            let html = '';
            const roomsToShow = filterRoomId ? coldRooms.filter(r => r.id == filterRoomId) : coldRooms;

            roomsToShow.forEach(room => {
                const roomDevices = filtered.filter(d => String(d.cold_room_id) === String(room.id));
                html += '<div style="border:1px solid var(--border-color); border-radius:8px; margin-bottom:16px; overflow:hidden;">';
                html += '<div style="background:#e6f7ff; padding:12px 16px; font-weight:600; display:flex; justify-content:space-between; align-items:center;">';
                html += '<span>🏠 ' + (room.name || '-') + ' <span style="font-weight:normal; color:var(--text-secondary);">(' + getRoomTypeName(room.room_type) + ')</span></span>';
                html += '<span class="badge badge-info">' + roomDevices.length + '台设备</span>';
                html += '</div>';

                if (roomDevices.length === 0) {
                    html += '<div style="padding:20px; text-align:center; color:var(--text-secondary);">该冷库暂无设备</div>';
                } else {
                    const grouped = {};
                    roomDevices.forEach(d => {
                        const t = d.device_type || d.type || 'other';
                        if (!grouped[t]) grouped[t] = [];
                        grouped[t].push(d);
                    });

                    html += '<div style="padding:12px 16px;">';
                    for (const [type, items] of Object.entries(grouped)) {
                        const typeName = DEVICE_TYPE_CN[type] || type;
                        html += '<div style="margin-bottom:8px;"><strong>' + typeName + '</strong> (' + items.length + '台)</div>';
                        html += '<table class="data-table" style="margin-bottom:12px;"><thead><tr><th>编号</th><th>品牌</th><th>型号</th><th style="width:60px;">操作</th></tr></thead><tbody>';
                        items.forEach(d => {
                            html += '<tr><td><code>' + (d.device_no || '-') + '</code></td><td>' + (d.brand || '-') + '</td><td>' + (d.model || '-') + '</td>';
                            html += '<td><button onclick="deleteDevice(' + (typeof d.id === 'string' ? "'" + d.id + "'" : d.id) + ')" class="delete" style="padding:2px 8px;font-size:12px;">删除</button></td></tr>';
                        });
                        html += '</tbody></table>';
                    }
                    html += '</div>';
                }
                html += '</div>';
            });

            const unassigned = filtered.filter(d => !d.cold_room_id);
            if (unassigned.length > 0) {
                html += '<div style="border:1px solid #faad14; border-radius:8px; margin-bottom:16px; overflow:hidden;">';
                html += '<div style="background:#fffbe6; padding:12px 16px; font-weight:600;">未分配冷库的设备 <span class="badge badge-warning">' + unassigned.length + '台</span></div>';
                html += '<div style="padding:12px 16px;"><table class="data-table"><thead><tr><th>编号</th><th>类型</th><th>品牌</th><th>型号</th><th style="width:60px;">操作</th></tr></thead><tbody>';
                unassigned.forEach(d => {
                    const typeName = DEVICE_TYPE_CN[d.device_type || d.type] || d.device_type || '-';
                    html += '<tr><td><code>' + (d.device_no || '-') + '</code></td><td>' + typeName + '</td><td>' + (d.brand || '-') + '</td><td>' + (d.model || '-') + '</td>';
                    html += '<td><button onclick="deleteDevice(' + (typeof d.id === 'string' ? "'" + d.id + "'" : d.id) + ')" class="delete" style="padding:2px 8px;font-size:12px;">删除</button></td></tr>';
                });
                html += '</tbody></table></div></div>';
            }

            container.innerHTML = html || '<p style="text-align:center; color:var(--text-secondary); padding:40px;">暂无数据</p>';
        }

        async function onCabBrandChange() {
            var brandId = document.getElementById('cabBrandSelect').value;
            var modelSelect = document.getElementById('cabModelSelect');
            if (!brandId) { modelSelect.innerHTML = '<option value="">请先选择品牌</option>'; modelSelect.disabled = true; return; }
            try { var models = await api.equipment.getModels({ brand_id: brandId }); equipmentLibrary.models[brandId] = models || []; }
            catch(e) { equipmentLibrary.models[brandId] = DEMO_MODELS[brandId] || []; }
            var ms = equipmentLibrary.models[brandId] || [];
            modelSelect.innerHTML = '<option value="">请选择型号</option>' + ms.map(function(m) { return '<option value="' + m.model_name + '">' + m.model_name + '</option>'; }).join('');
            modelSelect.disabled = false;
        }

        function addCabinetDevice() {
            var roomCbs = document.querySelectorAll('input[name="cab_rooms"]:checked');
            var roomIds = Array.from(roomCbs).map(function(cb) { return cb.value; });
            if (roomIds.length === 0) { alert('请至少选择一个关联冷库'); return; }
            var brandEl = document.getElementById('cabBrandSelect');
            var modelEl = document.getElementById('cabModelSelect');
            var brandName = brandEl.value && brandEl.selectedIndex > 0 ? brandEl.options[brandEl.selectedIndex].text : '-';
            var modelName = modelEl.value || '-';
            var roomNames = roomIds.map(function(rid) {
                if (rid === 'public') return '公共区域';
                var r = coldRooms.find(function(rm) { return String(rm.id) === String(rid); });
                return r ? r.name : rid;
            });
            var existingCount = getCabinetDevices().length;
            var deviceNo = 'CB-001-' + String(existingCount + 1).padStart(3, '0');
            devices.push({
                id: Date.now(), categoryId: currentCategory.id, type: 'cabinet', device_type: 'cabinet',
                device_no: deviceNo, cold_room_id: roomIds[0], cold_room_name: roomNames.join(', '),
                cabinet_rooms: roomIds, brand: brandName, model: modelName, specifications: {}, created_at: new Date().toISOString()
            });
            saveDevicesToStorage();
            api.projects.showSuccess('电控柜创建成功: ' + deviceNo);
            renderCabinetManageUI(document.getElementById('deviceForm'));
            updateStats();
        }

        var _subDeviceBrands = {};

        async function showAddSubDevice(cabinetId, subType) {
            var container = document.getElementById('subDeviceForm_' + cabinetId);
            if (!container) return;
            if (container.style.display === 'block' && container.getAttribute('data-type') === subType) { container.style.display = 'none'; return; }
            container.setAttribute('data-type', subType);
            container.style.display = 'block';
            var typeName = subType === 'thermostat' ? '温控器' : '电表';
            var color = subType === 'thermostat' ? '#1890ff' : '#faad14';
            var subCat = categories.find(function(c) { return resolveCategoryType(c) === subType; });
            var brands = [];
            if (subCat) { try { brands = await api.equipment.getBrands({ category_id: subCat.id }); } catch(e) { brands = []; } }
            _subDeviceBrands[cabinetId] = { brands: brands || [], models: {}, subCat: subCat };
            var meterAreaHtml = '';
            if (subType === 'meter') {
                meterAreaHtml = '<div class="form-group"><label>所属区域</label><select id="subMeterArea_' + cabinetId + '">';
                METER_AREAS.forEach(function(a) { meterAreaHtml += '<option value="' + a.value + '"' + (a.value === 'cold_chain' ? ' selected' : '') + '>' + a.label + '</option>'; });
                meterAreaHtml += '</select></div>';
            }
            var brandsHtml = '';
            (brands || []).forEach(function(b) { brandsHtml += '<option value="' + b.id + '">' + b.name + '</option>'; });
            container.innerHTML = '<div style="background:' + color + '08;border:1px solid ' + color + '40;border-radius:6px;padding:12px;margin-top:8px;">'
                + '<div style="font-size:13px;font-weight:500;color:' + color + ';margin-bottom:8px;">添加' + typeName + '到此电控柜</div>'
                + '<div class="form-grid" style="align-items:end;">' + meterAreaHtml
                + '<div class="form-group"><label>品牌</label><select id="subBrand_' + cabinetId + '" onchange="onSubBrandChange(' + cabinetId + ')"><option value="">请选择品牌</option>' + brandsHtml + '</select></div>'
                + '<div class="form-group"><label>型号</label><select id="subModel_' + cabinetId + '" disabled><option value="">请先选择品牌</option></select></div>'
                + '<div class="form-group"><label>数量</label><select id="subQty_' + cabinetId + '">' + [1,2,3,4,5].map(function(n){return '<option value="'+n+'">'+n+'</option>';}).join('') + '</select></div>'
                + '<div class="form-group" style="align-self:end;"><button type="button" class="btn btn-primary" style="background:' + color + ';border-color:' + color + ';padding:6px 14px;font-size:13px;" onclick="addSubDevice(' + cabinetId + ',\'' + subType + '\')">添加</button></div>'
                + '</div></div>';
        }

        async function onSubBrandChange(cabinetId) {
            var brandId = document.getElementById('subBrand_' + cabinetId).value;
            var modelSel = document.getElementById('subModel_' + cabinetId);
            if (!brandId) { modelSel.innerHTML = '<option value="">请先选择品牌</option>'; modelSel.disabled = true; return; }
            try { var models = await api.equipment.getModels({ brand_id: brandId }); _subDeviceBrands[cabinetId].models[brandId] = models || []; }
            catch(e) { _subDeviceBrands[cabinetId].models[brandId] = []; }
            var ms = _subDeviceBrands[cabinetId].models[brandId] || [];
            modelSel.innerHTML = '<option value="">请选择型号</option>' + ms.map(function(m) { return '<option value="' + m.model_name + '">' + m.model_name + '</option>'; }).join('');
            modelSel.disabled = false;
        }

        function addSubDevice(cabinetId, subType) {
            var brandSel = document.getElementById('subBrand_' + cabinetId);
            var modelSel = document.getElementById('subModel_' + cabinetId);
            var qtySel = document.getElementById('subQty_' + cabinetId);
            var brandName = brandSel.value && brandSel.selectedIndex > 0 ? brandSel.options[brandSel.selectedIndex].text : '-';
            var modelName = modelSel.value || '-';
            var qty = parseInt(qtySel.value) || 1;
            var cab = devices.find(function(d) { return String(d.id) === String(cabinetId); });
            if (!cab) { alert('电控柜不存在'); return; }
            var subCat = _subDeviceBrands[cabinetId] ? _subDeviceBrands[cabinetId].subCat : null;
            var prefix = subType === 'thermostat' ? 'TC' : 'PM';
            var meterArea = null;
            if (subType === 'meter') { var maEl = document.getElementById('subMeterArea_' + cabinetId); meterArea = maEl ? maEl.value : 'cold_chain'; }
            for (var i = 0; i < qty; i++) {
                var existingCount = devices.filter(function(d) { return String(d.cabinet_id) === String(cabinetId) && resolveCategoryType({code:d.device_type,name:''}) === subType; }).length;
                var deviceNo = prefix + '-' + cab.device_no.replace('CB-','') + '-' + String(existingCount + 1).padStart(3, '0');
                devices.push({
                    id: Date.now() + i, categoryId: subCat ? subCat.id : null, type: subType, device_type: subType,
                    device_no: deviceNo, cold_room_id: cab.cold_room_id, cold_room_name: cab.cold_room_name,
                    cabinet_id: cabinetId, cabinet_no: cab.device_no, brand: brandName, model: modelName,
                    meter_area: meterArea, specifications: {}, created_at: new Date().toISOString()
                });
            }
            saveDevicesToStorage();
            api.projects.showSuccess('成功添加 ' + qty + ' 台' + (subType === 'thermostat' ? '温控器' : '电表') + '到 ' + cab.device_no);
            renderCabinetManageUI(document.getElementById('deviceForm'));
            updateStats();
        }

        function editSubDevice(deviceId) {
            var idStr = String(deviceId);
            var dev = devices.find(function(d) { return String(d.id) === idStr; });
            if (!dev) { alert('设备不存在'); return; }
            var cdType = dev.device_type === 'thermostat' ? '温控器' : '电表';
            var newBrand = prompt('品牌 (当前: ' + dev.brand + ')', dev.brand);
            if (newBrand === null) return;
            var newModel = prompt('型号 (当前: ' + dev.model + ')', dev.model);
            if (newModel === null) return;
            var newNo = prompt('设备编号 (当前: ' + dev.device_no + ')', dev.device_no);
            if (newNo === null) return;
            dev.brand = newBrand || dev.brand;
            dev.model = newModel || dev.model;
            dev.device_no = newNo || dev.device_no;
            saveDevicesToStorage();
            api.projects.showSuccess(cdType + '已更新');
            renderCabinetManageUI(document.getElementById('deviceForm'));
        }

        function onMeterAreaChange() {
            const area = document.getElementById('meterAreaSelect');
            const coldRoomArea = document.getElementById('meterColdRoomArea');
            if (!area || !coldRoomArea) return;
            if (area.value === 'cold_chain') {
                coldRoomArea.style.display = 'block';
                document.querySelectorAll('input[name="meter_cold_rooms"]').forEach(cb => { cb.checked = true; });
            } else {
                coldRoomArea.style.display = 'none';
            }
        }

        function resetDeviceForm() {
            document.getElementById('deviceForm').reset();
            if (document.getElementById('meterAreaSelect')) onMeterAreaChange();
        }

        async function onBrandChange() {
            const brandId = document.getElementById('brandSelect').value;
            const modelSelect = document.getElementById('modelSelect');
            const dynamicArea = document.getElementById('dynamicFieldsArea');
            
            if (!brandId) {
                modelSelect.innerHTML = '<option value="">请先选择品牌</option>';
                modelSelect.disabled = true;
                dynamicArea.innerHTML = '';
                return;
            }

            try {
                var models = await api.equipment.getModels({ brand_id: brandId });
                equipmentLibrary.models[brandId] = models || [];
            } catch(e) {
                console.warn('API加载型号失败，使用演示数据:', e.message);
                equipmentLibrary.models[brandId] = DEMO_MODELS[brandId] || [];
            }
            var models = equipmentLibrary.models[brandId] || [];
            modelSelect.innerHTML = '<option value="">请选择型号</option>' + 
                models.map(function(m) { return '<option value="' + m.model_name + '">' + m.model_name + '</option>'; }).join('');
            modelSelect.disabled = false;

            // Render Dynamic Fields based on Brand Template
            const brand = equipmentLibrary.brands.find(b => b.id == brandId);
            if (brand && brand.spec_template) {
                renderDynamicFields(brand.spec_template);
            } else {
                dynamicArea.innerHTML = '';
            }
        }

        function renderDynamicFields(template) {
            const container = document.getElementById('dynamicFieldsArea');
            if (!template || template.length === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = template.map(field => {
                let inputHtml = '';
                if (field.type === 'select') {
                    const opts = (field.options || []).map(o => `<option value="${o}">${o}</option>`).join('');
                    inputHtml = `<select name="spec_${field.key}" class="dynamic-input"><option value="">请选择</option>${opts}</select>`;
                } else {
                    inputHtml = `<input type="text" name="spec_${field.key}" class="dynamic-input" placeholder="请输入${field.label}">`;
                }
                
                return `
                    <div class="form-group">
                        <label>${field.label}</label>
                        ${inputHtml}
                    </div>
                `;
            }).join('');
        }

        function onModelChange() {
            // Auto-fill dynamic fields if model has specs
            const brandId = document.getElementById('brandSelect').value;
            const modelName = document.getElementById('modelSelect').value;
            if (!brandId || !modelName) return;

            const models = equipmentLibrary.models[brandId] || [];
            const model = models.find(m => m.model_name === modelName);
            
            if (model && model.specifications) {
                Object.entries(model.specifications).forEach(([key, value]) => {
                    const input = document.querySelector(`[name="spec_${key}"]`);
                    if (input) input.value = value;
                });
            }
        }

        async function addDevice() {
            if (!currentCategory) return;
            
            const form = document.getElementById('deviceForm');
            const isMeter = isMeterCategory(currentCategory);
            const isTower = isCoolingTowerCategory(currentCategory);
            const brandId = form.brand_id.value;
            const modelName = form.model_name.value;
            const qty = parseInt(document.getElementById('deviceQtySelect').value) || 1;

            let coldRoomId = '';
            let coldRoomName = '-';
            let meterArea = '';
            let meterColdRoomIds = [];
            let cabinetId = '';

            if (isMeter) {
                meterArea = document.getElementById('meterAreaSelect').value;
                const areaObj = METER_AREAS.find(a => a.value === meterArea);
                coldRoomName = areaObj ? areaObj.label : meterArea;
                if (meterArea === 'cold_chain') {
                    document.querySelectorAll('input[name="meter_cold_rooms"]:checked').forEach(cb => {
                        meterColdRoomIds.push(cb.value);
                    });
                    if (meterColdRoomIds.length === 0) {
                        api.projects.showError('请至少勾选一个冷库');
                        return;
                    }
                    const roomNames = meterColdRoomIds.map(id => {
                        const r = coldRooms.find(rm => String(rm.id) === String(id));
                        return r ? r.name : id;
                    });
                    coldRoomName = '冷链电表 (' + roomNames.join(', ') + ')';
                }
            } else if (isTower) {
                const loc = form.install_location ? form.install_location.value : '楼顶';
                coldRoomName = loc || '楼顶';
            } else {
                coldRoomId = form.cold_room_id.value;
                const coldRoom = coldRooms.find(r => r.id == coldRoomId);
                coldRoomName = coldRoom ? coldRoom.name : (coldRoomId === 'public' ? '公共区域' : '-');
            }

            const specs = {};
            form.querySelectorAll('.dynamic-input').forEach(input => {
                const key = input.name.replace('spec_', '');
                specs[key] = input.value;
            });

            const brand = equipmentLibrary.brands.find(b => b.id == brandId);
            const brandName = brand ? brand.name : '-';
            const deviceType = resolveCategoryType(currentCategory) || currentCategory.code;
            const prefixMap = { 'thermostat': 'TC', 'air_cooler': 'AC', 'unit': 'UN', 'meter': 'PM', 'freezer': 'FR', 'defrost_controller': 'DF', 'cooling_tower': 'CT', 'cabinet': 'CB' };
            const prefix = prefixMap[deviceType] || (currentCategory.code ? currentCategory.code.substring(0, 2).toUpperCase() : 'DV');

            const apiPayload = {
                device_type: deviceType,
                brand: brandName,
                model: modelName,
                cold_room_id: coldRoomId ? parseInt(coldRoomId) : null,
                specifications: Object.keys(specs).length > 0 ? JSON.stringify(specs) : null
            };
            if (isMeter) {
                apiPayload.meter_area = meterArea;
                apiPayload.meter_cold_room_ids = meterColdRoomIds.map(Number);
            }

            let addedCount = 0;
            for (let i = 0; i < qty; i++) {
                const existingCount = devices.filter(d => d.categoryId === currentCategory.id).length;
                const deviceNo = `${prefix}-001-${String(existingCount + 1).padStart(3, '0')}`;

                let savedId = Date.now() + i;
                try {
                    const result = await api.devices.createDevice(projectId, apiPayload);
                    if (result && result.id) {
                        savedId = result.id;
                    }
                } catch (err) {
                    console.warn('API save failed, using local only:', err.message);
                }

                devices.push({
                    id: savedId,
                    categoryId: currentCategory.id,
                    type: deviceType,
                    device_type: deviceType,
                    device_no: deviceNo,
                    cold_room_id: coldRoomId || (isMeter ? meterArea : (isTower ? 'tower' : '')),
                    cold_room_name: coldRoomName,
                    brand: brandName,
                    model: modelName,
                    meter_area: isMeter ? meterArea : null,
                    meter_cold_room_ids: isMeter ? meterColdRoomIds : [],
                    cabinet_id: cabinetId || null,
                    specifications: { ...specs },
                    created_at: new Date().toISOString()
                });
                addedCount++;
            }

            saveDevicesToStorage();
            api.projects.showSuccess(`成功添加 ${addedCount} 台${currentCategory.name}`);
            form.reset();
            document.getElementById('dynamicFieldsArea').innerHTML = '';
            if (isMeter) onMeterAreaChange();
            
            updateStats();
            renderDeviceList();
        }

        function renderDeviceList() {
            if (!currentCategory) return;
            if (isCabinetCategory(currentCategory)) {
                document.getElementById('deviceList').innerHTML = '';
                return;
            }
            var stdType = resolveCategoryType(currentCategory);
            let list = devices.filter(function(d) {
                if (d.categoryId === currentCategory.id) return true;
                if (stdType && !d.categoryId) {
                    var dt = d.device_type || d.type || '';
                    return dt === stdType || (CODE_TO_DEVICE_TYPE[dt] || '') === stdType;
                }
                return false;
            });
            if (filterRoomId) {
                list = list.filter(d => String(d.cold_room_id) === String(filterRoomId));
            }
            const container = document.getElementById('deviceList');
            
            if (list.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px 0;">暂无设备，请添加第一个设备</p>';
                return;
            }

            container.innerHTML = list.map(d => {
                const specsHtml = Object.entries(d.specifications || {}).map(([k, v]) => 
                    '<div class="device-item-detail"><div class="device-item-detail-label">' + k + '</div><div class="device-item-detail-value">' + v + '</div></div>'
                ).join('');

                return `
                    <div class="device-item">
                        <div class="device-item-header">
                            <div class="device-item-title">${d.device_no} - ${d.brand} ${d.model}</div>
                            <div class="device-item-actions">
                                <button class="copy" onclick="copyDevice(${d.id})">复制</button>
                                <button onclick="deleteDevice(${d.id})" class="delete">删除</button>
                            </div>
                        </div>
                        <div class="device-item-details">
                            <div class="device-item-detail"><div class="device-item-detail-label">${d.meter_area ? '所属区域' : '所属冷库'}</div><div class="device-item-detail-value">${d.cold_room_name || '-'}</div></div>
                            <div class="device-item-detail"><div class="device-item-detail-label">品牌</div><div class="device-item-detail-value">${d.brand}</div></div>
                            <div class="device-item-detail"><div class="device-item-detail-label">型号</div><div class="device-item-detail-value">${d.model}</div></div>
                            ${specsHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            categories.forEach(cat => {
                var st = resolveCategoryType(cat);
                let list = devices.filter(function(d) {
                    if (d.categoryId === cat.id) return true;
                    if (st && !d.categoryId) {
                        var dt = d.device_type || d.type || '';
                        return dt === st || (CODE_TO_DEVICE_TYPE[dt] || '') === st;
                    }
                    return false;
                });
                if (filterRoomId) list = list.filter(d => String(d.cold_room_id) === String(filterRoomId));
                const el = document.getElementById('count_' + cat.id);
                if (el) el.textContent = list.length;
            });
        }

        async function copyDevice(id) {
            const device = devices.find(d => d.id === id);
            if (!device) return;
            
            const countStr = prompt('请输入复制数量 (1-10):', '1');
            const count = parseInt(countStr);
            if (!count || count < 1 || count > 10) return;

            let apiCopied = false;
            try {
                const result = await api.devices.copyDevice(device.id, { count: count, copy_gateway_config: false });
                if (Array.isArray(result) && result.length > 0) {
                    result.forEach(d => {
                        devices.push({
                            id: d.id,
                            categoryId: device.categoryId,
                            type: d.device_type,
                            device_type: d.device_type,
                            device_no: d.device_no,
                            cold_room_id: d.cold_room_id ? String(d.cold_room_id) : '',
                            cold_room_name: device.cold_room_name || '-',
                            brand: d.brand,
                            model: d.model,
                            specifications: device.specifications || {},
                            created_at: d.created_at || new Date().toISOString()
                        });
                    });
                    apiCopied = true;
                }
            } catch (err) {
                console.warn('API复制失败，使用本地复制:', err.message);
            }

            if (!apiCopied) {
                const currentCount = devices.filter(d => d.categoryId === device.categoryId).length;
                const prefix = device.device_no.split('-')[0];
                for (let i = 0; i < count; i++) {
                    const newNo = `${prefix}-001-${String(currentCount + i + 1).padStart(3, '0')}`;
                    devices.push({
                        ...device,
                        id: Date.now() + i,
                        device_no: newNo,
                        created_at: new Date().toISOString()
                    });
                }
            }

            saveDevicesToStorage();
            updateStats();
            renderDeviceList();
            api.projects.showSuccess('成功复制 ' + count + ' 台设备');
        }

        async function deleteDevice(id) {
            if (!confirm('确定删除?')) return;
            var idStr = String(id);
            var target = devices.find(d => String(d.id) === idStr);
            if (!target) { alert('设备不存在，可能已被删除'); return; }
            try { await api.devices.deleteDevice(id); } catch (err) { /* local-only device */ }
            var childIds = devices.filter(d => String(d.cabinet_id) === idStr).map(d => d.id);
            devices = devices.filter(d => String(d.id) !== idStr && String(d.cabinet_id) !== idStr);
            if (childIds.length > 0) {
                childIds.forEach(cid => { try { api.devices.deleteDevice(cid); } catch(e){} });
            }
            saveDevicesToStorage();
            updateStats();
            if (viewMode === 'room') { renderRoomGroupedView(); }
            else if (viewMode === 'relation') { renderRelationTopology(); }
            else if (isCabinetCategory(currentCategory)) { renderCabinetManageUI(document.getElementById('deviceForm')); }
            else { renderDeviceList(); }
        }

        const RELATION_COLORS = {
            'thermostat': { bg: '#e6f7ff', border: '#1890ff', text: '#1890ff', icon: '🌡' },
            'air_cooler': { bg: '#f6ffed', border: '#52c41a', text: '#52c41a', icon: '❄' },
            'unit': { bg: '#f9f0ff', border: '#722ed1', text: '#722ed1', icon: '⚙' },
            'meter': { bg: '#fff7e6', border: '#fa8c16', text: '#fa8c16', icon: '⚡' },
            'freezer': { bg: '#e6fffb', border: '#13c2c2', text: '#13c2c2', icon: '🧊' },
            'defrost_controller': { bg: '#fff0f6', border: '#eb2f96', text: '#eb2f96', icon: '🔥' }
        };
        const DEFAULT_COLOR = { bg: '#f0f0f0', border: '#999', text: '#666', icon: '📦' };

        function getDeviceColor(deviceType) {
            return RELATION_COLORS[deviceType] || DEFAULT_COLOR;
        }

        function renderRelationTopoView() {
            const relations = JSON.parse(localStorage.getItem('deviceRelations') || '[]');
            const container = document.getElementById('relationTopoContent');
            const emptyDiv = document.getElementById('relationTopoEmpty');

            if (relations.length === 0) {
                container.style.display = 'none';
                emptyDiv.style.display = 'block';
                return;
            }
            container.style.display = 'block';
            emptyDiv.style.display = 'none';

            const deviceMap = {};
            devices.forEach(d => { deviceMap[d.device_no] = d; });

            const roomRelations = {};
            relations.forEach(rel => {
                const srcDev = deviceMap[rel.source];
                const tgtDev = deviceMap[rel.target];
                const roomId = (srcDev && srcDev.cold_room_id) || (tgtDev && tgtDev.cold_room_id) || 'unassigned';
                if (!roomRelations[roomId]) roomRelations[roomId] = [];
                roomRelations[roomId].push(rel);
            });

            let html = '';

            for (const [roomId, rels] of Object.entries(roomRelations)) {
                const room = (roomId !== 'unassigned') ? coldRooms.find(r => String(r.id) === String(roomId)) : null;
                const roomName = room ? room.name : '未分配冷库';

                if (filterRoomId && String(roomId) !== String(filterRoomId)) continue;

                html += `<div style="border:1px solid var(--border-color); border-radius:8px; margin-bottom:20px; overflow:hidden;">`;
                html += `<div style="background:#fafafa; padding:12px 16px; font-weight:600; border-bottom:1px solid var(--border-color); display:flex; align-items:center; gap:8px;">`;
                html += `<span style="font-size:16px;">🏠</span> ${roomName}`;
                html += `<span style="font-weight:normal; color:var(--text-secondary); font-size:13px;">(${rels.length}条关系)</span></div>`;

                const nodesInRoom = new Set();
                rels.forEach(r => { nodesInRoom.add(r.source); nodesInRoom.add(r.target); });

                const adjList = {};
                rels.forEach(r => {
                    if (!adjList[r.source]) adjList[r.source] = [];
                    adjList[r.source].push({ target: r.target, desc: r.desc });
                });

                const typeGroups = {};
                nodesInRoom.forEach(no => {
                    const dev = deviceMap[no];
                    const type = dev ? (dev.device_type || dev.type || 'other') : 'other';
                    if (!typeGroups[type]) typeGroups[type] = [];
                    typeGroups[type].push(no);
                });

                html += `<div style="padding:16px;">`;

                const sourceNodes = Object.keys(adjList);
                sourceNodes.forEach(sourceNo => {
                    const srcDev = deviceMap[sourceNo] || {};
                    const srcType = srcDev.device_type || srcDev.type || 'other';
                    const srcColor = getDeviceColor(srcType);
                    const targets = adjList[sourceNo];

                    html += `<div style="display:flex; align-items:flex-start; margin-bottom:16px;">`;

                    html += `<div style="min-width:180px; background:${srcColor.bg}; border:2px solid ${srcColor.border}; border-radius:8px; padding:10px 14px; text-align:center;">`;
                    html += `<div style="font-size:18px; margin-bottom:4px;">${srcColor.icon}</div>`;
                    html += `<div style="font-weight:600; color:${srcColor.text}; font-size:13px;">${DEVICE_TYPE_CN[srcType] || srcType}</div>`;
                    html += `<div style="font-size:12px; color:#333; margin-top:2px;">${sourceNo}</div>`;
                    html += `<div style="font-size:11px; color:#999;">${srcDev.brand || ''} ${srcDev.model || ''}</div>`;
                    html += `</div>`;

                    html += `<div style="display:flex; flex-direction:column; margin-left:8px; flex:1;">`;
                    targets.forEach((t, i) => {
                        const tgtDev = deviceMap[t.target] || {};
                        const tgtType = tgtDev.device_type || tgtDev.type || 'other';
                        const tgtColor = getDeviceColor(tgtType);

                        html += `<div style="display:flex; align-items:center; margin-bottom:${i < targets.length - 1 ? '8' : '0'}px;">`;

                        html += `<div style="display:flex; align-items:center; width:100px; justify-content:center;">`;
                        html += `<div style="flex:1; height:2px; background:${srcColor.border};"></div>`;
                        html += `<div style="font-size:16px; color:#999; margin:0 4px;">→</div>`;
                        html += `<div style="flex:1; height:2px; background:${tgtColor.border};"></div>`;
                        html += `</div>`;

                        html += `<div style="min-width:180px; background:${tgtColor.bg}; border:2px solid ${tgtColor.border}; border-radius:8px; padding:10px 14px; text-align:center;">`;
                        html += `<div style="font-size:18px; margin-bottom:4px;">${tgtColor.icon}</div>`;
                        html += `<div style="font-weight:600; color:${tgtColor.text}; font-size:13px;">${DEVICE_TYPE_CN[tgtType] || tgtType}</div>`;
                        html += `<div style="font-size:12px; color:#333; margin-top:2px;">${t.target}</div>`;
                        html += `<div style="font-size:11px; color:#999;">${tgtDev.brand || ''} ${tgtDev.model || ''}</div>`;
                        html += `</div>`;

                        if (t.desc) {
                            html += `<span style="font-size:11px; color:#999; margin-left:8px;">${t.desc}</span>`;
                        }
                        html += `</div>`;
                    });
                    html += `</div>`;
                    html += `</div>`;
                });

                const meterDevices = [];
                const nonMeterDevices = [];
                nodesInRoom.forEach(no => {
                    const dev = deviceMap[no];
                    const type = dev ? (dev.device_type || dev.type) : '';
                    if (type === 'meter') meterDevices.push(no);
                    else nonMeterDevices.push(no);
                });

                if (meterDevices.length > 0 && nonMeterDevices.length > 0) {
                    const meterInAdj = meterDevices.some(m => adjList[m]);
                    if (!meterInAdj) {
                        html += `<div style="margin-top:12px; padding-top:12px; border-top:1px dashed #d9d9d9;">`;
                        html += `<div style="font-size:12px; color:var(--text-secondary); margin-bottom:8px;">电表计量范围（未建立关系时仅显示同冷库设备）：</div>`;
                        const mColor = getDeviceColor('meter');
                        meterDevices.forEach(mNo => {
                            const mDev = deviceMap[mNo] || {};
                            html += `<div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">`;
                            html += `<span style="background:${mColor.bg}; border:1px solid ${mColor.border}; padding:4px 10px; border-radius:4px; font-size:12px; color:${mColor.text};">${mColor.icon} ${mNo}</span>`;
                            html += `<span style="color:#999;">→ 同冷库设备</span>`;
                            html += `</div>`;
                        });
                        html += `</div>`;
                    }
                }

                html += `</div></div>`;
            }

            if (!html) {
                container.style.display = 'none';
                emptyDiv.style.display = 'block';
                return;
            }

            html += `<div style="margin-top:16px; padding:12px; background:#fffbe6; border:1px solid #ffe58f; border-radius:4px; font-size:13px; color:#666;">`;
            html += `<strong>提示：</strong>设备关系在「设备关系配置」页面中维护。箭头方向表示控制或服务方向（源 → 目标）。`;
            html += `</div>`;

            container.innerHTML = html;
        }

        function continueToGateway() {
            if (devices.length === 0) return alert('请至少添加一个设备');
            window.location.href = 'device-bindline.html';
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
