<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目列表 - 冷库项目信息管理系统</title>
    <link rel="stylesheet" href="assets/css/app.css">
    <script src="assets/js/config.js?v=20260223"></script>
    <script src="assets/js/api.js?v=20260223"></script>
    <style>
        /* 统计卡片样式 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }
        .stat-card {
            background: white;
            padding: 12px 14px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-left: 4px solid var(--primary-color);
        }
        .stat-card.success { border-left-color: var(--success-color); }
        .stat-card.warning { border-left-color: var(--warning-color); }
        .stat-card.danger { border-left-color: var(--danger-color); }
        .stat-card.info { border-left-color: var(--info-color); }
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .search-section {
            margin-bottom: 12px;
        }
        .table-container {
            min-height: 460px;
        }
        .sortable-th {
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .sortable-th:hover {
            color: var(--primary-color);
        }
        .sort-arrow {
            font-size: 11px;
            margin-left: 4px;
            color: #bbb;
        }
        .sort-arrow.active {
            color: var(--primary-color);
        }

        /* 设备统计弹窗样式 */
        .device-stats-tooltip {
            position: absolute;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            min-width: 250px;
            display: none;
        }
        .device-stats-tooltip.show {
            display: block;
        }
        .device-stat-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--bg-color);
        }
        .device-stat-item:last-child {
            border-bottom: none;
        }
        .device-icon {
            margin-right: 8px;
        }

        /* 操作按钮组 */
        .action-btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
        }
        .action-btn-group .btn-sm {
            white-space: nowrap;
        }

        /* 详情图标样式 */
        .info-icon {
            cursor: pointer;
            color: var(--primary-color);
            font-size: 16px;
            margin-left: 8px;
        }
        .info-icon:hover {
            color: var(--info-color);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">📦</div>
                <span class="brand-name">冷库项目信息管理系统</span>
            </div>
            <nav class="sidebar-nav">
                <a href="project-list.html" class="nav-item active">
                    <span class="nav-icon">📋</span>
                    <span>项目管理</span>
                </a>
                <a href="device-management.html" class="nav-item">
                    <span class="nav-icon">🔧</span>
                    <span>设备管理</span>
                </a>
                <a href="gateway-config.html" class="nav-item">
                    <span class="nav-icon">📡</span>
                    <span>网关配置</span>
                </a>
                <a href="business-options.html" class="nav-item" id="navBusinessOptions">
                    <span class="nav-icon">⚙️</span>
                    <span>业务类型配置</span>
                </a>
                <a href="equipment-config.html" class="nav-item" id="navEquipmentConfig">
                    <span class="nav-icon">🧩</span>
                    <span>设备配置管理</span>
                </a>
                <a href="user-management.html" class="nav-item" id="navUserManagement">
                    <span class="nav-icon">👥</span>
                    <span>用户管理</span>
                </a>
                <a href="index.html" class="nav-item">
                    <span class="nav-icon">←</span>
                    <span>返回首页</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content" id="mainContent">
            <!-- 顶部栏 -->
            <header class="top-bar">
                <h1>项目列表</h1>
                <div class="user-menu">
                    <span class="user-name" id="userDisplayName">👤 客户</span>
                    <button class="btn-logout" onclick="window.location.href='index.html'">退出</button>
                </div>
            </header>

            <!-- 内容区域 -->
            <div class="content-wrapper">
                <!-- 统计卡片 -->
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card" id="statTotalCard">
                        <div class="stat-label">项目总数</div>
                        <div class="stat-value" id="statTotalValue">0</div>
                    </div>
                    <div class="stat-card warning" id="statSubmittedCard">
                        <div class="stat-label" id="statSubmittedLabel">待配置</div>
                        <div class="stat-value" id="statSubmittedValue">0</div>
                    </div>
                    <div class="stat-card danger" id="statUnfinishedCard">
                        <div class="stat-label">未完成</div>
                        <div class="stat-value" id="statUnfinishedValue">0</div>
                    </div>
                    <div class="stat-card info" id="statCompletedCard">
                        <div class="stat-label">已完成</div>
                        <div class="stat-value" id="statCompletedValue">0</div>
                    </div>
                </div>

                <!-- 搜索筛选区 -->
                <div class="search-section">
                    <div class="search-row">
                        <input type="text" class="search-input" id="searchInput" placeholder="搜索项目名称或编号...">
                        
                        <!-- 企业名称筛选（管理员可见） -->
                        <select class="filter-select" id="filterCompany" style="display:none;">
                            <option value="">全部企业</option>
                        </select>
                        
                        <!-- 业务类型/项目类型筛选 -->
                        <select class="filter-select" id="filterBusinessType">
                            <option value="">全部业务类型</option>
                            <optgroup label="盒马">
                                <option value="qianzhi">前置仓</option>
                                <option value="chaohesuan">超盒算</option>
                                <option value="aolai">盒马奥莱店</option>
                                <option value="xiansheng">盒马鲜生店</option>
                            </optgroup>
                            <optgroup label="其他">
                                <option value="xingjian">新建</option>
                                <option value="gaizao">改造</option>
                                <option value="kuojian">扩建</option>
                            </optgroup>
                        </select>
                        
                        <select class="filter-select" id="filterStatus">
                            <option value="">全部状态</option>
                            <option value="new">新项目</option>
                            <option value="equipment_registration">设备登记中</option>
                            <option value="submitted">已提交待配置</option>
                            <option value="configuring">配置中</option>
                            <option value="completed">已完成</option>
                        </select>
                        
                        <button class="btn-primary" onclick="filterProjects()">搜索</button>
                        <button class="btn-success" onclick="showCreateDialog()">+ 新建项目</button>
                    </div>
                </div>

                <!-- 项目表格 -->
                <div class="card">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>项目编号</th>
                                    <th class="sortable-th" onclick="toggleSort()">登记时间 <span class="sort-arrow" id="sortArrow">&#9650;&#9660;</span></th>
                                    <th>项目名称</th>
                                    <th>企业名称</th>
                                    <th>终端客户</th>
                                    <th>业务类型</th>
                                    <th>城市</th>
                                    <th>期望到货时间</th>
                                    <th>当前流程</th>
                                    <th style="min-width:220px;">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be loaded by JS -->
                            </tbody>
                        </table>
                    </div>

                    <!-- 记录数 -->
                    <div style="padding: 12px 16px; color: var(--text-secondary); font-size: 13px; text-align: right;" id="recordCount"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 全局数据
        let allProjects = [];
        let filteredProjects = [];
        let sortOrder = 'desc'; // 'desc' = 最新在前, 'asc' = 最早在前

        // 页面加载时获取数据
        async function loadProjects() {
            try {
                if (isProductionMode()) {
                    // 生产模式：调用真实API
                    const response = await api.projects.getProjects();
                    allProjects = response.data || response || [];
                } else {
                    // 演示模式：使用mock数据
                    allProjects = getMockProjects();
                }
                
                filteredProjects = [...allProjects];
                applySortOrder();
                renderProjects();
                updateStats();
            } catch (error) {
                console.error('加载项目列表失败:', error);
                api.projects.showError('加载项目列表失败: ' + error.message);
                allProjects = getMockProjects();
                filteredProjects = [...allProjects];
                applySortOrder();
                renderProjects();
                updateStats();
            }
        }

        function initUserContext() {
            const rawRole = (localStorage.getItem('userRole') || 'customer').toLowerCase();
            const role = rawRole === 'factory' ? 'admin' : (rawRole === 'user' ? 'customer' : rawRole);
            const username = localStorage.getItem('currentUsername') || '';
            const roleText = role === 'admin' ? '管理员' : '客户';

            const userDisplay = document.getElementById('userDisplayName');
            if (userDisplay) {
                userDisplay.textContent = `👤 ${roleText}${username ? ' - ' + username : ''}`;
            }

            const navBusinessOptions = document.getElementById('navBusinessOptions');
            if (navBusinessOptions) {
                navBusinessOptions.style.display = role === 'admin' ? '' : 'none';
            }
            const navUserManagement = document.getElementById('navUserManagement');
            if (navUserManagement) {
                navUserManagement.style.display = role === 'admin' ? '' : 'none';
            }
            const navEquipmentConfig = document.getElementById('navEquipmentConfig');
            if (navEquipmentConfig) {
                navEquipmentConfig.style.display = role === 'admin' ? '' : 'none';
            }
        }

        // 渲染项目列表
        function renderProjects() {
            const tbody = document.querySelector('.data-table tbody');
            
            if (filteredProjects.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 60px 20px; color: var(--text-secondary);">
                            <div style="font-size: 48px; margin-bottom: 16px;">📦</div>
                            <div style="font-size: 16px; margin-bottom: 8px;">暂无项目数据</div>
                            <div style="font-size: 14px;">点击右上角"新建项目"创建第一个项目</div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filteredProjects.map((project, index) => `
                <tr>
                    <td>${project.project_no || 'P' + String(project.id).padStart(6, '0')}</td>
                    <td>${formatDate(project.created_at) || '-'}</td>
                    <td>
                        <div style="font-weight: 500;">${project.name || '未命名项目'}</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">${project.address || '-'}</div>
                    </td>
                    <td>${project.creator_company || '-'}</td>
                    <td><span class="badge badge-primary">${project.end_customer || '-'}</span></td>
                    <td>${project.business_type || '-'}</td>
                    <td>${project.city || '-'}</td>
                    <td>${formatDate(project.expected_arrival_time) || '-'}</td>
                    <td>
                        <span class="badge ${getStatusClass(project.status)}">${getStatusText(project.status)}</span>
                    </td>
                    <td>
                        <div class="action-btn-group">
                            <button class="btn-sm btn-primary" onclick="viewProject(${project.id})">进入</button>
                            <button class="btn-sm" onclick="editProject(${project.id})">编辑</button>
                            <button class="btn-sm" onclick="copyProject(${project.id})">复制</button>
                            <button class="btn-sm" onclick="deleteProject(${project.id})" style="color:#ff4d4f;border-color:#ff4d4f;">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            var countEl = document.getElementById('recordCount');
            if (countEl) countEl.textContent = '共 ' + filteredProjects.length + ' 条记录';
        }

        // 更新统计数据
        function updateStats() {
            var total = allProjects.length;
            var submitted = allProjects.filter(function(p) { return (p.status || '') === 'submitted'; }).length;
            var configuring = allProjects.filter(function(p) { return (p.status || '') === 'configuring'; }).length;
            var completed = allProjects.filter(function(p) { return (p.status || '').toLowerCase() === 'completed'; }).length;
            var unfinished = total - completed;

            document.getElementById('statTotalValue').textContent = total;
            document.getElementById('statSubmittedValue').textContent = submitted + configuring;
            document.getElementById('statUnfinishedValue').textContent = unfinished;
            document.getElementById('statCompletedValue').textContent = completed;

            var role = (localStorage.getItem('userRole') || 'customer').toLowerCase();
            var normalizedRole = role === 'factory' ? 'admin' : (role === 'user' ? 'customer' : role);
            var label = document.getElementById('statSubmittedLabel');
            if (normalizedRole === 'admin') {
                label.textContent = '待配置';
            } else {
                label.textContent = '已提交';
            }
        }

        // 筛选项目
        function filterProjects() {
            const companyEl = document.getElementById('filterCompany');
            const businessEl = document.getElementById('filterBusinessType');
            const statusEl = document.getElementById('filterStatus');
            const searchEl = document.getElementById('searchInput');

            const companyFilter = companyEl ? companyEl.value : '';
            const businessFilter = businessEl ? businessEl.value : '';
            const statusFilter = statusEl ? statusEl.value : '';
            const searchText = searchEl ? searchEl.value.toLowerCase() : '';

            filteredProjects = allProjects.filter(project => {
                const matchCompany = !companyFilter || (project.creator_company || '') === companyFilter;
                const matchBusiness = !businessFilter || project.business_type === businessFilter;
                const matchStatus = !statusFilter || project.status === statusFilter;
                const matchSearch = !searchText || 
                    (project.name && project.name.toLowerCase().includes(searchText)) ||
                    (project.project_no && project.project_no.toLowerCase().includes(searchText)) ||
                    (project.address && project.address.toLowerCase().includes(searchText));
                
                return matchCompany && matchBusiness && matchStatus && matchSearch;
            });

            applySortOrder();
            renderProjects();
        }

        // 删除项目
        async function deleteProject(id) {
            if (!confirm('确定要删除这个项目吗？此操作不可恢复！')) {
                return;
            }

            try {
                if (isProductionMode()) {
                    await api.projects.deleteProject(id);
                    api.projects.showSuccess('项目删除成功！');
                } else {
                    // 演示模式
                    alert('演示模式：项目已删除（刷新后恢复）');
                }
                
                // 从列表中移除
                allProjects = allProjects.filter(p => p.id !== id);
                filterProjects();
                updateStats();
            } catch (error) {
                console.error('删除项目失败:', error);
            }
        }

        // 查看项目详情
        function viewProject(id) {
            if (isProductionMode()) {
                localStorage.setItem('currentProjectId', id);
            }
            window.location.href = 'project-detail.html?id=' + id;
        }

        // 编辑项目
        function editProject(id) {
            window.location.href = 'project-create.html?id=' + id + '&mode=edit';
        }

        // 复制项目
        function copyProject(id) {
            window.location.href = 'project-create.html?copyFrom=' + id;
        }

        // 辅助函数
        function getStatusClass(status) {
            var map = {
                'new': 'badge-secondary',
                'equipment_registration': 'badge-primary',
                'submitted': 'badge-warning',
                'configuring': 'badge-primary',
                'completed': 'badge-success',
                'pending': 'badge-warning',
                'in_progress': 'badge-primary',
                'cancelled': 'badge-danger'
            };
            return map[status] || 'badge-secondary';
        }

        function getStatusText(status) {
            var map = {
                'new': '新项目',
                'equipment_registration': '设备登记中',
                'submitted': '已提交待配置',
                'configuring': '配置中',
                'completed': '已完成',
                'pending': '待开始',
                'in_progress': '进行中',
                'cancelled': '已取消'
            };
            return map[status] || status || '未知';
        }

        function applySortOrder() {
            filteredProjects.sort(function(a, b) {
                var ta = new Date(a.created_at || 0).getTime();
                var tb = new Date(b.created_at || 0).getTime();
                return sortOrder === 'desc' ? tb - ta : ta - tb;
            });
            updateSortArrow();
        }

        function toggleSort() {
            sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
            applySortOrder();
            renderProjects();
        }

        function updateSortArrow() {
            var el = document.getElementById('sortArrow');
            if (!el) return;
            if (sortOrder === 'desc') {
                el.innerHTML = '<span style="color:#bbb">&#9650;</span><span class="active" style="color:var(--primary-color)">&#9660;</span>';
            } else {
                el.innerHTML = '<span class="active" style="color:var(--primary-color)">&#9650;</span><span style="color:#bbb">&#9660;</span>';
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }

        // Mock数据（演示模式使用）
        function getMockProjects() {
            return [
                {
                    id: 1,
                    project_no: 'P202401001',
                    name: '盒马鲜生前置仓项目',
                    location: '上海市浦东新区',
                    end_customer: '盒马',
                    business_type: '前置仓',
                    status: 'in_progress',
                    expected_arrival_time: '2024-02-15',
                    cold_room_count: 5,
                    thermostat_count: 8,
                    unit_count: 3,
                    meter_count: 5,
                    freezer_count: 2,
                    device_count: 23
                },
                {
                    id: 2,
                    project_no: 'P202401002',
                    name: '永辉超市生鲜区改造',
                    location: '北京市朝阳区',
                    end_customer: '永辉',
                    business_type: '超市',
                    status: 'pending',
                    expected_arrival_time: '2024-02-20',
                    cold_room_count: 3,
                    thermostat_count: 5,
                    unit_count: 2,
                    meter_count: 3,
                    freezer_count: 1,
                    device_count: 14
                }
            ];
        }

        // 绑定筛选事件
        document.addEventListener('DOMContentLoaded', function() {
            initUserContext();
            loadProjects();
            
            // 筛选监听
            document.getElementById('filterCompany')?.addEventListener('change', filterProjects);
            document.getElementById('filterBusinessType')?.addEventListener('change', filterProjects);
            document.getElementById('filterStatus')?.addEventListener('change', filterProjects);
            document.getElementById('searchInput')?.addEventListener('input', filterProjects);
        });

        // 侧边栏收缩功能
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const icon = document.getElementById('collapseIcon');
            
            sidebar.classList.toggle('collapsed');
            
            if (sidebar.classList.contains('collapsed')) {
                sidebar.style.width = '60px';
                icon.textContent = '▶';
                // 隐藏文字
                document.querySelectorAll('.sidebar .brand-name, .sidebar .nav-item span:not(.nav-icon)').forEach(el => {
                    el.style.display = 'none';
                });
            } else {
                sidebar.style.width = '240px';
                icon.textContent = '◀';
                // 显示文字
                document.querySelectorAll('.sidebar .brand-name, .sidebar .nav-item span:not(.nav-icon)').forEach(el => {
                    el.style.display = '';
                });
            }
        }

        // 显示设备统计弹窗
        function showDeviceStats(event, id) {
            event.stopPropagation();
            
            // 隐藏所有其他弹窗
            document.querySelectorAll('.device-stats-tooltip').forEach(el => {
                el.classList.remove('show');
            });
            
            const tooltip = document.getElementById(id);
            tooltip.classList.toggle('show');
            
            // 定位弹窗
            const icon = event.target;
            const rect = icon.getBoundingClientRect();
            tooltip.style.left = (rect.left - 120) + 'px';
            tooltip.style.top = (rect.top + 30) + 'px';
        }

        // 点击页面其他地方关闭所有弹窗
        document.addEventListener('click', () => {
            document.querySelectorAll('.device-stats-tooltip').forEach(el => {
                el.classList.remove('show');
            });
        });

        // 新建项目对话框
        function showCreateDialog() {
            window.location.href = 'project-create.html';
        }

        // 管理员：动态加载企业名称筛选下拉
        async function loadCompanyFilter() {
            const role = (localStorage.getItem('userRole') || '').toLowerCase();
            const normalizedRole = role === 'factory' ? 'admin' : (role === 'user' ? 'customer' : role);
            const filterEl = document.getElementById('filterCompany');
            if (normalizedRole !== 'admin' || !filterEl) return;
            filterEl.style.display = '';

            if (!isProductionMode()) {
                // demo 模式：从 localStorage 中的项目数据提取企业名称
                const projects = getMockProjects();
                const companySet = new Set(projects.map(p => p.company_name).filter(Boolean));
                companySet.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    filterEl.appendChild(opt);
                });
                return;
            }

            try {
                const companies = await api.users.get('/users/companies');
                companies.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    filterEl.appendChild(opt);
                });
            } catch(e) { console.warn('加载企业列表失败:', e.message); }
        }
        loadCompanyFilter();
    </script>
    <script src="assets/js/nav.js"></script>
</body>
</html>
