<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备关系配置 - 冷库项目信息管理系统</title>
    <link rel="stylesheet" href="assets/css/app.css">
    <script src="assets/js/config.js?v=20260223"></script>
    <script src="assets/js/api.js?v=20260223"></script>
    <style>
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .project-info-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .project-info-card h3 {
            margin: 0 0 12px 0;
            font-size: 18px;
        }

        .project-info-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            font-size: 14px;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .step {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .step::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: #e8e8e8;
            z-index: -1;
        }

        .step:last-child::after {
            display: none;
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e8e8e8;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .step.active .step-number {
            background: var(--primary-color);
            color: white;
        }

        .step.completed .step-number {
            background: #52c41a;
            color: white;
        }

        .step.completed::after {
            background: #52c41a;
        }

        .step-title {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
        }

        .step.active .step-title {
            color: var(--primary-color);
            font-weight: 500;
        }

        .step.completed .step-title {
            color: #52c41a;
        }

        .step.clickable { cursor: pointer; }
        .step.clickable:hover .step-number { transform: scale(1.1); box-shadow: 0 2px 8px rgba(82,196,26,0.4); }
        .step.clickable .step-number, .step.clickable .step-title { transition: all 0.2s; }

        .page-header {
            background: white;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .page-header h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            color: var(--text-primary);
        }

        .page-header p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-card {
            background: white;
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-group label .required {
            color: #f5222d;
            margin-left: 4px;
        }

        .form-group select, .form-group input {
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group select:focus, .form-group input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }

        .form-help {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .relation-list {
            margin-top: 24px;
        }

        .relation-item {
            background: #fafafa;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .relation-item-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .relation-item-device {
            background: #e6f7ff;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 500;
            color: var(--primary-color);
            font-size: 14px;
        }
        
        .device-tag {
            font-size: 12px;
            color: #666;
            background: #fff;
            border: 1px solid #d9d9d9;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }

        .relation-item-arrow {
            font-size: 20px;
            color: #999;
            font-weight: bold;
        }

        .relation-item-actions button {
            padding: 6px 16px;
            border: 1px solid #d9d9d9;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .relation-item-actions button:hover {
            border-color: #ff4d4f;
            color: #ff4d4f;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 12px 32px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #096dd9;
        }

        .btn-secondary {
            background: white;
            color: var(--text-primary);
            border: 1px solid #d9d9d9;
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-success {
            background: #52c41a;
            color: white;
        }

        .btn-success:hover {
            background: #389e0d;
        }

        .info-box {
            background: #e6f7ff;
            border-left: 4px solid var(--primary-color);
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 24px;
        }

        .info-box h4 {
            margin: 0 0 8px 0;
            color: var(--primary-color);
        }

        .info-box p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="steps"></div>
        <script src="assets/js/step-nav.js"></script>
        <script>renderStepNav(4);</script>

        <!-- 项目信息 -->
        <div class="project-info-card">
            <h3>📦 当前项目</h3>
            <div class="project-info-grid" id="projectInfo"></div>
        </div>

        <!-- 页面标题 -->
        <div class="page-header">
            <h1>设备关系配置</h1>
            <p>自由配置设备之间的关联关系（如：温控器控制冷风机、机组为冷风机供冷等）</p>
        </div>

        <!-- 关系说明 -->
        <div class="info-box">
            <h4>📝 配置说明</h4>
            <p>请选择【源设备】（发出控制或提供服务的设备）和【目标设备】（被控制或接受服务的设备）建立关联。支持一对多配置。</p>
        </div>

        <!-- 关系配置表单 -->
        <div class="form-card">
            <form id="relationForm">
                <h3 style="margin: 0 0 20px 0; color: var(--primary-color);">添加新关系</h3>
                
                <!-- 冷库筛选 -->
                <div style="margin-bottom: 20px; padding: 12px; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 4px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label style="color: #faad14;">🚩 第一步：选择操作范围（按冷库筛选设备）</label>
                        <select id="coldRoomFilter" onchange="onColdRoomChange()">
                            <option value="">显示全部设备 (不筛选)</option>
                        </select>
                    </div>
                </div>

                <div class="form-grid">
                    <!-- Source Column -->
                    <div style="background:#f9f9f9; padding:16px; border-radius:8px;">
                        <h4 style="margin-top:0; margin-bottom:16px; font-size:16px; color:#333;">👉 源设备 (Source)</h4>
                        <div class="form-group">
                            <label>设备类型</label>
                            <select id="sourceCategory" onchange="updateDeviceList('source')">
                                <option value="">请选择类型</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-top:12px;">
                            <label>选择设备 <span style="color:#52c41a; font-weight:normal; font-size:12px;">(可多选)</span></label>
                            <div id="sourceDeviceContainer" style="border:1px solid #d9d9d9; border-radius:4px; height:120px; overflow-y:auto; padding:8px; background:#fff; color:#999;">
                                请先选择类型
                            </div>
                        </div>
                    </div>

                    <!-- Target Column -->
                    <div style="background:#f9f9f9; padding:16px; border-radius:8px;">
                        <h4 style="margin-top:0; margin-bottom:16px; font-size:16px; color:#333;">👉 目标设备 (Target)</h4>
                        <div class="form-group">
                            <label>设备类型</label>
                            <select id="targetCategory" onchange="updateDeviceList('target')">
                                <option value="">请选择类型</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-top:12px;">
                            <label>选择设备 <span style="color:#52c41a; font-weight:normal; font-size:12px;">(可多选)</span></label>
                            <div id="targetDeviceContainer" style="border:1px solid #d9d9d9; border-radius:4px; height:120px; overflow-y:auto; padding:8px; background:#fff; color:#999;">
                                请先选择类型
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-top:20px;">
                    <label>关系描述 (可选)</label>
                    <input type="text" name="desc" placeholder="例如：控制启动、提供冷量..." style="width:100%;">
                </div>

                <div style="margin-top: 24px;">
                    <button type="submit" class="btn btn-primary">添加关系</button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()" style="margin-left: 12px;">重置</button>
                </div>
            </form>
        </div>

        <!-- 已配置的关系列表 -->
        <div class="form-card">
            <h3 style="margin: 0 0 20px 0; color: var(--text-primary);">已配置的关系 <span style="font-weight: normal; color: var(--text-secondary);" id="relationCount">(0条)</span></h3>
            <div class="relation-list" id="relationList">
                <p style="text-align: center; color: var(--text-secondary); padding: 40px 0;">
                    暂无关系，请添加第一条设备关系
                </p>
            </div>
        </div>

        <!-- 操作栏 -->
        <div class="action-bar">
            <button class="btn btn-secondary" onclick="window.location.href='device-register.html'">← 返回上一步</button>
            <button class="btn btn-success" id="btnNextStep" onclick="continueToSubmit()">完成设备关系配置，提交审核 →</button>
        </div>
    </div>

    <script>
        requireAuth();
        // Data State
        let categories = [];
        let devices = [];
        let relations = JSON.parse(localStorage.getItem('deviceRelations') || '[]');
        let coldRooms = []; // Will be loaded from API
        
        // Load Project
        const project = JSON.parse(localStorage.getItem('currentProject') || '{}');
        const projectId = localStorage.getItem('currentProjectId');
        
        async function initPage() {
            if (!projectId) {
                alert('未找到项目ID，请重新进入项目');
                window.location.href = 'project-list.html';
                return;
            }

            try {
                // Load Cold Rooms & Devices from API
                let roomsData = [];
                let devicesData = [];
                
                console.log(`[Init] ProjectID: ${projectId}`);

                try {
                    roomsData = await api.projects.getColdRooms(projectId);
                    console.log(`[API] ColdRooms: ${roomsData?.length}`);
                } catch (apiError) {
                    console.warn('API加载冷库失败:', apiError.message);
                }

                try {
                    devicesData = await api.devices.getDevices({ project_id: projectId });
                    console.log(`[API] Devices: ${devicesData?.length}`);
                } catch (apiError) {
                    console.warn('API加载设备失败:', apiError.message);
                }
                
                const localRoomsAll = JSON.parse(localStorage.getItem('coldRooms') || '[]');
                const localRooms = localRoomsAll.filter(r => String(r.project_id) === String(projectId));
                
                const localDevices = projectId 
                    ? JSON.parse(localStorage.getItem(`devices_${projectId}`) || '[]')
                    : JSON.parse(localStorage.getItem('devices') || '[]');

                console.log(`[Local] ColdRooms: ${localRooms.length}, Devices: ${localDevices.length}`);

                coldRooms = (roomsData && roomsData.length > 0) ? roomsData : localRooms;
                
                // 合并 API 设备与本地设备，避免遗漏
                const apiDevices = (devicesData && devicesData.length > 0) ? devicesData : [];
                
                if (apiDevices.length > 0 && localDevices.length > 0) {
                    // 以本地数据为基础，用 API 数据补充（去重）
                    const merged = [...localDevices];
                    const localIds = new Set(localDevices.map(d => String(d.id)));
                    const localNos = new Set(localDevices.map(d => d.device_no).filter(Boolean));
                    apiDevices.forEach(ad => {
                        if (!localIds.has(String(ad.id)) && !localNos.has(ad.device_no)) {
                            merged.push(ad);
                        }
                    });
                    devices = merged;
                    console.log(`[Merge] API:${apiDevices.length} + Local:${localDevices.length} => Merged:${devices.length}`);
                } else if (apiDevices.length > 0) {
                    devices = apiDevices;
                } else if (localDevices.length > 0) {
                    devices = localDevices;
                } else {
                    devices = [];
                }
                
                // Debug UI: If no data, show why
                if (coldRooms.length === 0) {
                    const debugInfo = `(Debug: ProjID=${projectId}, API=${roomsData?.length||0}, Local=${localRooms.length})`;
                    console.warn('No cold rooms found:', debugInfo);
                    // document.getElementById('coldRoomFilter').setAttribute('data-debug', debugInfo);
                }

                // Render Project Info
                document.getElementById('projectInfo').innerHTML = `
                    <div><strong>项目编号：</strong>${project.project_no || '-'}</div>
                    <div><strong>项目名称：</strong>${project.name || '-'}</div>
                    <div><strong>最终用户：</strong>${project.end_customer || '-'}</div>
                    <div><strong>冷库数量：</strong>${coldRooms.length}个</div>
                    <div><strong>设备数量：</strong>${devices.length}台</div>
                `;

                // Load Categories dynamically
                categories = await api.equipment.getCategories();
                if (!categories || categories.length === 0) {
                    categories = [
                        {id:1, name:'冷风机', code:'air_cooler'}, 
                        {id:2, name:'温控器', code:'temp-controller'}, 
                        {id:3, name:'机组', code:'refrigeration_unit'}, 
                        {id:4, name:'电表', code:'electric_meter'}, 
                        {id:5, name:'冷柜', code:'freezer'}, 
                        {id:6, name:'融霜控制器', code:'defrost_controller'}
                    ];
                }
                
                // Add "Cold Room" as a pseudo category for relations (Meter -> Cold Room)
                categories.push({ id: 'cold_room', name: '冷库 (空间)' });

                populateCategorySelects();
                populateColdRoomSelect(); 
                
            } catch (e) {
                console.error('Failed to load data:', e);
                api.projects.showError('加载数据失败: ' + e.message);
            }

            renderRelationList();
        }

        function populateCategorySelects() {
            const opts = '<option value="">请选择类型</option>' + 
                categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.getElementById('sourceCategory').innerHTML = opts;
            document.getElementById('targetCategory').innerHTML = opts;
        }

        // New function
        function populateColdRoomSelect() {
            const filter = document.getElementById('coldRoomFilter');
            
            if (!coldRooms || coldRooms.length === 0) {
                // Show more detailed error for debugging
                const mode = window.CONFIG?.MODE || 'unknown';
                const projId = localStorage.getItem('currentProjectId');
                filter.innerHTML = `<option value="">暂无冷库 (Mode:${mode}, PID:${projId})</option>`;
                filter.disabled = true;
                return;
            }
            
            filter.disabled = false;
            // Keep the "All" option
            let html = '<option value="">显示全部设备 (不筛选)</option>';
            coldRooms.forEach(room => {
                html += `<option value="${room.id}">🏠 ${room.name}</option>`;
            });
            filter.innerHTML = html;
        }

        // New handler
        function onColdRoomChange() {
            // Re-render device lists based on new filter
            updateDeviceList('source');
            updateDeviceList('target');
        }

        const CODE_TO_BACKEND = {
            'temp-controller': 'thermostat', 'thermostat': 'thermostat',
            'air_cooler': 'air_cooler',
            'refrigeration_unit': 'unit', 'unit': 'unit',
            'electric_meter': 'meter', 'meter': 'meter',
            'freezer': 'freezer', 'defrost_controller': 'defrost_controller'
        };

        function updateDeviceList(side) {
            const catId = document.getElementById(`${side}Category`).value;
            const container = side === 'source' 
                ? document.getElementById('sourceDeviceContainer') 
                : document.getElementById('targetDeviceContainer');
            
            if (!catId) {
                container.innerHTML = '请先选择类型';
                container.style.color = '#999';
                return;
            }

            const roomId = document.getElementById('coldRoomFilter').value;

            const selectedCat = categories.find(c => String(c.id) === String(catId));
            const catCode = selectedCat ? (selectedCat.code || '') : '';
            const backendType = CODE_TO_BACKEND[catCode] || catCode;

            console.log(`[DeviceList] side=${side}, catId=${catId}, catCode=${catCode}, backendType=${backendType}, totalDevices=${devices.length}`);
            if (devices.length > 0) {
                console.log('[DeviceList] 第一个设备字段:', JSON.stringify(Object.keys(devices[0])), 'device_type=', devices[0].device_type, 'categoryId=', devices[0].categoryId);
            }

            const filtered = devices.filter(d => {
                if (String(catId) === 'cold_room') return false;

                let typeMatch = false;
                const dType = (d.device_type || d.type || '').toLowerCase();
                const dCatCode = (d.categoryId != null) ? String(d.categoryId) : '';

                if (backendType && dType === backendType) {
                    typeMatch = true;
                } else if (catCode && dType === catCode) {
                    typeMatch = true;
                } else if (dCatCode && dCatCode === String(catId)) {
                    typeMatch = true;
                }

                let roomMatch = true;
                if (roomId) {
                    roomMatch = String(d.cold_room_id) === String(roomId);
                }

                return typeMatch && roomMatch;
            });

            // Special case: Cold Room as a target/source entity
            if (String(catId) === 'cold_room') {
                const roomList = roomId 
                    ? coldRooms.filter(r => String(r.id) === String(roomId)) 
                    : coldRooms;
                
                const html = roomList.length === 0 
                    ? '无可用冷库'
                    : roomList.map(r => `
                        <label style="display: flex; align-items: center; padding: 6px 0; cursor: pointer;">
                            <input type="checkbox" name="${side}_devices" value="${r.name}" style="width:16px; height:16px; margin-right:8px;">
                            <span>🏠 ${r.name}</span>
                        </label>
                    `).join('');
                
                container.style.color = '#333';
                container.innerHTML = html;
                return;
            }

            // Normal Device List (Multi-select for both Source and Target)
            container.style.color = '#333';
            if(filtered.length === 0) {
                container.innerHTML = '该类型下无设备';
            } else {
                container.innerHTML = filtered.map(d => `
                    <label style="display: flex; align-items: center; padding: 6px 0; cursor: pointer;">
                        <input type="checkbox" name="${side}_devices" value="${d.device_no}" style="width:16px; height:16px; margin-right:8px;">
                        <span>${d.device_no} <span style="color:#999; font-size:12px;">(${d.model})</span></span>
                    </label>
                `).join('');
            }
        }

        // Form Submit
        document.getElementById('relationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get selected sources
            const sourceCheckboxes = document.querySelectorAll('input[name="source_devices"]:checked');
            const sourceNos = Array.from(sourceCheckboxes).map(cb => cb.value);
            
            // Get selected targets
            const targetCheckboxes = document.querySelectorAll('input[name="target_devices"]:checked');
            const targetNos = Array.from(targetCheckboxes).map(cb => cb.value);
            const desc = this.desc.value;

            if (sourceNos.length === 0) return alert('请至少选择一个源设备');
            if (targetNos.length === 0) return alert('请至少选择一个目标设备');

            let addedCount = 0;
            
            // Create Cartesian Product (Many-to-Many)
            sourceNos.forEach(sourceNo => {
                targetNos.forEach(targetNo => {
                    if (sourceNo === targetNo) return; // Prevent self-link

                    // Check exists
                    const exists = relations.some(r => r.source === sourceNo && r.target === targetNo);
                    if (!exists) {
                        relations.push({
                            id: Date.now() + Math.random(),
                            source: sourceNo,
                            target: targetNo,
                            desc: desc,
                            created_at: new Date().toISOString()
                        });
                        addedCount++;
                    }
                });
            });

            localStorage.setItem('deviceRelations', JSON.stringify(relations));
            api.projects.showSuccess(`成功添加 ${addedCount} 条关系`);
            
            sourceCheckboxes.forEach(cb => cb.checked = false);
            targetCheckboxes.forEach(cb => cb.checked = false);
            this.desc.value = '';

            renderRelationList();
        });

        function resetForm() {
            document.getElementById('relationForm').reset();
            document.getElementById('sourceDeviceContainer').innerHTML = '请先选择类型';
            document.getElementById('targetDeviceContainer').innerHTML = '请先选择类型';
        }

        function renderRelationList() {
            const listDiv = document.getElementById('relationList');
            document.getElementById('relationCount').textContent = `(${relations.length}条)`;

            if (relations.length === 0) {
                listDiv.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px 0;">暂无关系，请添加第一条设备关系</p>';
                return;
            }

            // Group by Source for 1-to-many display
            const grouped = {};
            relations.forEach(rel => {
                if (!grouped[rel.source]) grouped[rel.source] = [];
                grouped[rel.source].push(rel);
            });

            listDiv.innerHTML = Object.entries(grouped).map(([sourceNo, groupRels]) => {
                const sDev = devices.find(d => d.device_no === sourceNo) || { brand: '', model: '' };
                const sCat = categories.find(c => c.id === sDev.categoryId);
                
                // Render targets list
                const targetsHtml = groupRels.map(rel => {
                    let targetDisplay = '';
                    let tCatName = '未知';
                    
                    // Check if target is a device or a cold room (pseudo-target)
                    // If targetNo is not in devices list, check if it matches a cold room name
                    const tDev = devices.find(d => d.device_no === rel.target);
                    if (tDev) {
                        targetDisplay = `${rel.target} <span style="font-size:12px; color:#999;">(${tDev.model})</span>`;
                        const tCat = categories.find(c => c.id === tDev.categoryId);
                        tCatName = tCat ? tCat.name : '未知';
                    } else {
                        // Maybe it's a cold room name
                        targetDisplay = `🏠 ${rel.target}`;
                        tCatName = '冷库';
                    }

                    return `
                        <div style="display:flex; align-items:center; margin-top:8px; padding-left:24px; position:relative;">
                            <div style="position:absolute; left:6px; top:-10px; bottom:14px; width:2px; background:#e8e8e8; border-left:1px dashed #ccc;"></div>
                            <div style="position:absolute; left:6px; top:50%; width:12px; height:1px; background:#e8e8e8; border-top:1px dashed #ccc;"></div>
                            <div style="background:#fff; border:1px solid #eee; padding:6px 12px; border-radius:4px; display:flex; align-items:center; gap:8px; flex:1;">
                                <span class="device-tag">${tCatName}</span>
                                <span>${targetDisplay}</span>
                                ${rel.desc ? `<span style="font-size:12px; color:#999; margin-left:auto;">${rel.desc}</span>` : ''}
                                <button onclick="deleteRelation(${rel.id})" style="margin-left:12px; border:none; background:none; color:#ff4d4f; cursor:pointer; font-size:12px;">删除</button>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="relation-item" style="display:block;">
                        <div style="font-weight:600; color:#333; margin-bottom:4px; display:flex; align-items:center; gap:8px;">
                            <span class="device-tag">${sCat ? sCat.name : '未知'}</span>
                            <span>${sourceNo}</span>
                            <span style="font-size:12px; color:#999; font-weight:normal;">${sDev.brand} ${sDev.model}</span>
                        </div>
                        ${targetsHtml}
                    </div>
                `;
            }).join('');
        }

        window.deleteRelation = function(id) {
            if(!confirm('确定删除?')) return;
            relations = relations.filter(r => r.id !== id);
            localStorage.setItem('deviceRelations', JSON.stringify(relations));
            renderRelationList();
        };

        window.continueToSubmit = function() {
            if (relations.length === 0) {
                if (!confirm('还没有配置任何设备关系，确定要继续吗？')) return;
            }
            window.location.href = 'project-complete.html?mode=submit';
        };

        function applyRoleRestrictions() {
            // 所有角色统一跳转到提交审核页面
        }

        // Init
        document.addEventListener('DOMContentLoaded', function() {
            initPage();
            applyRoleRestrictions();
        });
    </script>
</body>
</html>
